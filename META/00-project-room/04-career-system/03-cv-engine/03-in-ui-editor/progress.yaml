    description: |
      Edit page toolbar 加 Versions dropdown — list of snapshots,
      点 entry → 替换编辑器 content (sets dirty), 用户确认后 Save 创建新
      snapshot。

      实现 (Edit.tsx +~120 lines):
        - state 加: versions: VersionEntry[] / showVersions: boolean
        - VersionEntry type = { filename, ts, size }
        - load 时 GET /content 返回的 versions 数组就够; 不必另外 GET
          /versions list
        - 顶部 toolbar 加 Versions button: opens dropdown panel
        - Dropdown panel (.c-resume-versions-panel) 显示:
          - "Versions ({count})" header
          - 每行: 时间戳 (toLocaleString) + size (KB) + button "Load"
          - button click:
            1. 若 current dirty → confirm "Discard unsaved changes?"
            2. fetch GET /versions/:filename
            3. setContent(versionContent) + setDirty(true)
               (loaded but not yet saved — 表示需要 Save 才生效)
            4. Toast 提示 "Loaded version from {ts}. Click Save to commit."
        - 关闭 dropdown 通过 click outside / X / Escape
        - 不直接 "restore-then-save" 一步: 给用户 review 机会

      新 CSS (+~30 行):
        - .c-resume-versions-button (toolbar button)
        - .c-resume-versions-panel (popover, absolute, scrollable)
        - .c-resume-versions-row (flex row, padding, hover)
        - .c-resume-versions-empty (居中灰)

      ROOM COMPLETE work:
        - room.yaml lifecycle: planning → active
        - _tree.yaml 同步
        - spec.md ROOM-COMPLETE rewrite (3 milestone overview + Backend API +
          UI structure + 下游 contracts)
        - 03-cv-engine sub-epic: 20% → ~40% (2/5 features done)

      验收:
        - 编辑 + Save 几次 → versions 累积 (3-5 条)
        - 点 Versions button → panel 显示
        - 点 "Load" → editor content 替换 + status "Unsaved"
        - 不 Save → 关闭 → beforeunload 拦截
        - Save → versions list 多一条 (旧的当前 + 即将 load 的也成 snapshot)

      Locked design:
        - 不直接 restore-then-save: 给用户 review 机会, 防误操作
        - 用 GET /content 返回的 versions 列表: 不重复请求
        - dropdown 不是 modal: 不打断编辑节奏

