milestones:
  - id: "m1-auto-select-backend"
    name: "Backend: scoring algorithm + POST /api/career/resumes/auto-select endpoint"
    status: completed
    actual_lines: 110
    actual_files:
      - "server.mjs"
    estimated_files:
      - "server.mjs"
    estimated_lines: 160
    depends_on: []
    complexity_flags: []
    open_questions: []
    commit_hash: "765ed8a"
    description: |
      Pure keyword-based scoring algorithm + endpoint. No LLM. Reads metadata.yml
      of every resume in index, scores against incoming { jd_text, role? } body,
      returns picked id + per-resume rationale.

      实现 (server.mjs +~160 lines):

        - Zod input schema:
          AutoSelectRequestSchema = z.object({
            jd_text: z.string().max(50_000),     // raw JD body — match against jd_keywords + negative_keywords
            role: z.string().max(200).optional(),// 可选 — 单独 match role_keywords
          })

        - Helpers:
          - countMatches(text, keywords): returns matched[] list of unique keywords
            (same kw 出现多次只算 1 — 防 jd 灌水关键词刷分)
          - scoreResume(metadata, jd_text, role):
            const role_text = (role ?? '').toLowerCase()
            const jd_lower = jd_text.toLowerCase()
            roleMatches = role_keywords filter(kw => role_text.includes(kw.toLowerCase()))
            jdMatches = jd_keywords filter(kw => jd_lower.includes(kw.toLowerCase()))
            negativeMatches = negative_keywords filter(kw => jd_lower.includes(kw.toLowerCase()))
            score = roleMatches.length * 1 + jdMatches.length * 1 - negativeMatches.length * 2
            return { score, matched: { role_keywords, jd_keywords, negative_keywords } }

        - Endpoint POST /api/career/resumes/auto-select:
          - parse body via AutoSelectRequestSchema
          - readResumeIndex
          - if resumes.length === 0 → 404 { error: "No resumes registered" }
          - for each resume in index:
            - md = await readResumeMetadata(r.id)
            - { score, matched } = scoreResume(md, jd_text, role)
            - rankings.push({ id, title, score, matched, is_default, created_at })
          - sort rankings:
            1. score descending
            2. is_default true first
            3. created_at ascending (older established first)
          - 返回:
            {
              picked: rankings[0].id,
              picked_score: rankings[0].score,
              picked_reason: human-readable explanation
              fallback_to_default: boolean (true if max_score <= 0 and used is_default)
              rankings: full sorted array
            }
          - 400 on Zod error / 500 on internal

        - 复用现有: readResumeIndex / readResumeMetadata
          (Zod-defaulted nested fields ensure 老 metadata.yml 不带新字段时
          read 出来的 match_rules 是空数组而非 undefined)

      验收 (smoke 6 cases):
        1. 没有 resume → 404 ✓
        2. 1 resume, jd_text 不命中 → score=0, picked = that resume, fallback_to_default 反映 is_default ✓
        3. 3 resumes (backend / applied-ai / fullstack):
           - backend: role_kw=[Backend, SDE], jd_kw=[k8s, microservices], neg=[frontend]
           - applied-ai: role_kw=[ML, AI], jd_kw=[LangChain, RAG]
           - fullstack: role_kw=[Fullstack], jd_kw=[React, Node]
           POST { jd_text: "Build microservices on k8s with grpc...", role: "Backend SDE" }
           → picked = backend (score 4: 2 role + 2 jd) ✓
           → applied-ai score 0 ✓
           → fullstack score 0 ✓
        4. JD with negative keyword "frontend-only" + neg=[frontend]
           → backend score = role_count + jd_count - 2 (negative penalty)
        5. Tie: 2 resumes both score 2, one is_default → default 排第一 ✓
        6. 大 jd_text (40KB) → 200 + 算完 < 200ms (case-insensitive substring is O(n*m))

      Locked design (long-term-best):
        - keyword-based, NOT LLM: 3-5 base 选 base 不需要 LLM 细微; transparent
          + free + deterministic + 用户可 debug
        - 同 keyword 多次只算 1: 防 jd 灌水关键词刷分
        - +1 / +1 / -2 weight 简单线性: 易理解, 不调参; 后续若需要可在
          metadata.yml 加 weight override
        - tie-break is_default → created_at: established resume 优先
        - case-insensitive substring (no \b): 跑 "k8s" 匹配 "k8s/" 既要简单
          又要 cheap; 我们 keyword 是 slug-y, 不会有 false positive
        - fallback always returns 一个 picked: 不让前端处理 "无 picked" 状态
        - rankings 全返: 前端可显示完整排名, 用户能 override 看为啥别的没被选

      下游影响:
        - m2 tester UI 调本 endpoint
        - 03-cv-engine/05-tailor-engine 调本 endpoint 选 base 后 tailor
        - 06-evaluator/02-stage-b-sonnet 后续可参考 picked + matched
        - 07-applier 真正 apply 时调本 endpoint

