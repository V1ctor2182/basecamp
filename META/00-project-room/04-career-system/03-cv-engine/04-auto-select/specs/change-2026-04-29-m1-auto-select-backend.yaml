spec_id: "change-2026-04-29-m1-auto-select-backend"
type: change
state: active
intent:
  summary: "m1: Auto-select backend — keyword scoring algorithm + POST /api/career/resumes/auto-select endpoint"
  detail: |
    Pure keyword-based scoring. No LLM. Reads `metadata.match_rules` of every
    resume in the index, scores against incoming JD body, returns picked id +
    full rankings with matched-keyword breakdown. Transparent + free +
    deterministic; user can debug why a particular resume was/wasn't picked.

    Files modified:
      - server.mjs (+110 lines):
        - AutoSelectRequestSchema: { jd_text: z.string().max(50_000),
          role: z.string().max(200).optional() }
        - matchKeywords(haystack, keywords) helper:
          · Lower-case substring match
          · Each keyword counted ONCE even if multiple occurrences (防 jd
            灌水关键词刷分)
          · Trims keyword whitespace; skips empty kw
          · Returns matched[] (preserves original kw casing for display)
        - scoreResumeAgainstJd(metadata, jd_text, role):
          · score = role_matched.length + jd_matched.length - 2 * negative_matched.length
          · 返回 { score, matched: {role_keywords, jd_keywords, negative_keywords} }
        - buildPickReason(top): human-readable string per case:
          · score > 0 → "Matched N role keywords, M jd keywords[, K negative penalty]"
          · score == 0 + is_default → "No positive matches; using default resume"
          · score == 0 + !is_default → "No positive matches; tie-broken by created_at"
          · score < 0 → "Best available has net-negative match; review match_rules"
        - POST /api/career/resumes/auto-select endpoint:
          · 404 if no resumes registered
          · 400 on Zod error (Invalid request + details)
          · For each resume: readResumeMetadata + scoreResumeAgainstJd
          · Sort: score desc → is_default first → created_at asc
          · top = rankings[0]; fallback_to_default = top.score <= 0 && top.is_default
          · 返回 { picked, picked_score, picked_reason, fallback_to_default, rankings }

      - 复用现有: readResumeIndex / readResumeMetadata
        (Zod-defaulted nested fields ensure 老 metadata.yml 不带新字段时
        match_rules 是空数组而非 undefined)

    Verification (smoke 8/8 passed):
      1. No resumes → 404 'No resumes registered' ✓
      2. 3 resumes seeded (backend default / applied-ai / fullstack):
         backend (role=[Backend,SDE,Platform], jd=[k8s,microservices,grpc,kafka], neg=[frontend-only])
         applied-ai (role=[ML,AI,Applied], jd=[LangChain,RAG,LLM,Agent])
         fullstack (role=[Fullstack,Frontend], jd=[React,Node,TypeScript])
         "Build distributed microservices on k8s with grpc and kafka" + role="Backend SDE"
         → picked=backend score=6 (2 role + 4 jd) ✓
         → other rankings scored 0 ✓
      3. AI-themed JD → picked=applied-ai score=6 ✓
      4. "frontend-only React Node TypeScript" + role="Fullstack":
         → fullstack score=4 (1 role + 3 jd)
         → backend score=-2 (1 jd matched 'frontend-only' contains 'frontend-only' as
           negative kw; net = 0 - 2 × 1 = -2) ✓
         (Note: backend's jd_keywords [k8s, microservices, grpc, kafka] don't match,
          but its negative_keywords [frontend-only] does match — penalty applied)
      5. JD doesn't match anything ("Translator for Sumerian tablets") →
         picked=backend (default) score=0 fallback_to_default=true
         reason='No positive matches; using default resume' ✓
      6. Same kw 5 times in JD ("k8s k8s k8s k8s k8s") → score=1, matched=['k8s']
         (counted once) ✓
      7. Missing jd_text → 400 Zod 'invalid_type' ✓
      8. Performance: 30KB jd_text → 12ms; 49KB jd_text → 11ms; 50001 chars → 400
         too_big ✓ (case-insensitive substring is plenty fast)

    Locked design (long-term-best, plan-milestones):
      - keyword-based, NOT LLM: 3-5 base resumes don't need LLM nuance;
        transparent + free + deterministic + 用户可 debug 为什么没选 X
      - 同 keyword 多次只算 1: 防 jd 灌水关键词刷分
      - +1 / +1 / -2 weight 简单线性: 易理解, 不调参; metadata.yml 后续可加
        weight override 字段如有需要
      - tie-break is_default → created_at asc: established resume 优先
      - case-insensitive substring (no \b): 跑 "k8s" 匹配 "k8s/" cheap;
        keyword 是 slug-y, false positive 概率低
      - fallback always returns 一个 picked: 不让前端处理 "无 picked" 状态
      - rankings 全返: 前端可显示完整排名, 用户能 override 看为啥别的没被选

    下游影响:
      - m2 tester UI 调本 endpoint (toolbar 折叠区, JD textarea + role input)
      - 03-cv-engine/05-tailor-engine 调本 endpoint 选 base 后做 LLM 改写
      - 06-evaluator/02-stage-b-sonnet 后续可参考 picked + matched 给评估
        的 Block E (Resume Hooks) 提示
      - 07-applier 真正 apply 时调本 endpoint 选 base resume

    NOT yet (m2 加):
      - Frontend UI: tester panel in Resumes Gallery toolbar
      - 真正 apply flow 集成 (07-applier 范畴)
