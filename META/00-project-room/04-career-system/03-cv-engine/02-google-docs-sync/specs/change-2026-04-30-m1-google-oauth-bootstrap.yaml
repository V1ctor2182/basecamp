spec_id: "change-2026-04-30-m1-google-oauth-bootstrap"
type: change
state: active
intent:
  summary: "m1: Google OAuth bootstrap + helper module + refresh-token persistence + smoke"
  detail: |
    为 google-docs-sync 建立 first-of-kind 的 OAuth 基础设施。交付包括：

      - src/career/lib/googleDocs.mjs
        · normalizeGoogleDocId() 支持 bare ID / docs URL
        · buildGoogleOAuthUrl() 固定 offline + consent
        · exchangeGoogleAuthCode() / refreshGoogleAccessToken()
        · exportGoogleDocAsMarkdown() -> Drive files.export(text/markdown)

      - server.mjs
        · GET /api/career/google/oauth/start
        · GET /api/career/google/oauth/callback
        · state TTL + callback HTML 成功/失败页
        · refresh token 存 data/career/.oauth.json

      - scripts/smoke-google-docs-sync.mjs
        · helper smoke: doc ID parse / auth URL / token exchange mock /
          invalid_grant / markdown export

    Locked design:
      - client credentials 读 env 或 data/config.json
      - token file gitignored, 不进入 repo
      - scope = drive.readonly
      - prompt=consent 保障 refresh token 获取/重连
