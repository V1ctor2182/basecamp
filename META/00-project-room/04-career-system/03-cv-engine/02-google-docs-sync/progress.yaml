milestones:
  - id: "m1-google-oauth-bootstrap"
    name: "Google OAuth bootstrap + token store + helper module + smoke"
    status: completed
    actual_lines: 255
    actual_files:
      - "src/career/lib/googleDocs.mjs"
      - "server.mjs"
      - "scripts/smoke-google-docs-sync.mjs"
    estimated_files:
      - "src/career/lib/googleDocs.mjs"
      - "server.mjs"
      - "scripts/smoke-google-docs-sync.mjs"
    estimated_lines: 220
    depends_on: []
    complexity_flags: ["external_api", "oauth", "design_decisions"]
    open_questions: []
    commit_hash: "TBD"
    description: |
      新增 Google Docs 专用 helper module + OAuth 启动/回调/refresh token
      存储链路。client credentials 支持环境变量
      GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET，或 data/config.json 里的
      googleClientId / googleClientSecret（该文件本身 gitignored）。

      交付:
        - src/career/lib/googleDocs.mjs
          · normalizeGoogleDocId() 支持 bare ID / docs URL
          · buildGoogleOAuthUrl() 固定 access_type=offline + prompt=consent
          · exchangeGoogleAuthCode() / refreshGoogleAccessToken()
          · exportGoogleDocAsMarkdown() → Drive files.export(text/markdown)
        - server.mjs
          · GET /api/career/google/oauth/start → redirect 到 Google OAuth
          · GET /api/career/google/oauth/callback → code exchange + persist
            data/career/.oauth.json refresh token
          · in-memory state TTL 防 CSRF / 过期回调
          · invalid_grant 时清 token，提示重新授权
        - scripts/smoke-google-docs-sync.mjs
          · 6 个 helper smoke (ID parse / auth URL / token exchange /
            invalid_grant / export markdown)

      Locked design:
        - refresh token 存 data/career/.oauth.json（已在 .gitignore）
        - redirect URI 默认 http://localhost:${PORT}/api/.../callback，可用
          CAREER_GOOGLE_REDIRECT_BASE_URL override
        - Drive scope 用 readonly，避免写权限
        - prompt=consent 保证首次/重连时 refresh token 可拿到

