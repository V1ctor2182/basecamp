      - "src/career/cv/DiffViewer.tsx"
      - "src/career/cv/tailorPanel.css"
      - "src/career/evaluator/StageBBatch.tsx"
      - "package.json"
      - "scripts/smoke-tailor-ui.mjs"
    estimated_lines: 300
    depends_on: ["m3-schema-and-endpoint"]
    complexity_flags: ["design_decisions"]
    open_questions: []
    description: |
      Pipeline tab StageBBatch row gets a 'Tailor' button per evaluated row.
      Click opens TailorPanel modal: resume picker (default = Auto-Select),
      Block E preview, optional user hint, Run Tailor → DiffViewer renders
      base vs tailored markdown side-by-side. Approve → POST /render/pdf,
      download. Reject → hint textarea, re-run. ROOM COMPLETE rollups.

      Files:
        - package.json (+1 dep): react-diff-viewer-continued ~30KB gz
          (OQ-1 = a; polished side-by-side diff, syntax highlight, worth
          the dep for fabrication-detection UX)

        - src/career/cv/TailorPanel.tsx (~180 lines):
          · Modal (role=dialog + aria-modal + Esc dismiss + click-outside,
            same a11y pattern as ReportViewer from 02-stage-b-sonnet/m5)
          · Resume picker (defaults to Auto-Select picked_resume_id)
          · Block E preview (collapsible, shows blockEText fetched on open)
          · userHint textarea (shown after first Reject)
          · Run Tailor button → POST /api/career/cv/tailor → DiffViewer
          · Approve button → POST /api/career/render/pdf with tailored
            markdown → download blob
          · Reject button → reveal hint textarea + Re-Run button
          · Loading + error states; cost display

        - src/career/cv/DiffViewer.tsx (~80 lines):
          · Wraps react-diff-viewer-continued
          · Side-by-side mode; line-numbers; syntax highlighting via
            existing rehype-highlight (already in deps)

        - src/career/cv/tailorPanel.css (~80 lines):
          · Modal overlay + panel styling (sbb- prefix style scope)
          · Diff frame container

        - src/career/evaluator/StageBBatch.tsx (+~15 lines):
          · Add 'Tailor' button per row (disabled if !report_path)
          · Open TailorPanel(jobId) modal on click

        - scripts/smoke-tailor-ui.mjs (~100 lines, ~5 assertions):
          GET endpoint shape verification only (UI itself manual via dev
          server, matches Stage B m5 smoke pattern)

      ROOM COMPLETE work:
        - room.yaml lifecycle: planning → active
        - _tree.yaml synced
        - 03-cv-engine parent progress: 80% → 100% 🎉 (5/5 ROOMs ✅)
        - 04-career-system: 65% → 67%

      下游 unblocked:
        - 07-applier: tailored PDF feeds the Applier upload flow
        - 08-human-gate-tracker: tailor-approved diffs enter the human-gate
          audit log
        - Future feedback Room: hint-history persistence (currently OQ-3
          deferred)

      验收: smoke 5/5 PASS; manual UI test passes (acceptance criteria
      from spec: "对 shortlist 4.0+ 的一个岗位跑 tailor，产出 markdown
      里明显反映 Block E 的建议（关键词注入 / 排序 / Summary 改写），但
      所有指标和经历都能在 base.md 里找到出处").

