milestones:
  - id: "m1-tailor-prompt-module"
    name: "tailorPrompt.mjs — prompt builder + parser + no-fabrication system block"
    status: completed
    estimated_files:
      - "src/career/cv/tailorPrompt.mjs"
      - "scripts/smoke-tailor-prompt.mjs"
    estimated_lines: 250
    depends_on: []
    complexity_flags: ["external_api", "prompt_engineering", "design_decisions"]
    open_questions: []
    description: |
      Tailor prompt module. System block (cache_control:ephemeral) carries:
      identity.yml + base.md + proof-points.md (full fact-source corpus per
      OQ-2) + metadata.yml.emphasize + the hard NO-FABRICATION instruction:
        "If a metric or claim is not in the source base.md or proof-points.md,
         DO NOT invent it. Only reorganize or rephrase existing content."
      User message carries JD body + Block E text (Personalization Plan) +
      optional userHint.

      Files:
        - src/career/cv/tailorPrompt.mjs (~200 lines):
          · TAILOR_MODEL = 'claude-sonnet-4-6' (matches MODEL_PRICING)
          · NO_FABRICATION_INSTRUCTION const — exact prompt text per
            constraint-tailor-engine-001 spec
          · buildSystemBlock(bundle) — ONE text block with cache_control
            (single source-of-truth caching pattern from Stage B m1)
          · buildUserMessage(jobMeta, blockEText, userHint?) — JD body
            (trim 12000 chars) + Block E + optional hint
          · buildTailorPrompt(jobMeta, bundle, blockEText, userHint?) →
            { model, max_tokens: 4096, system, messages } (no tools — this
            is single-turn, no Anthropic Tools API needed)
          · parseTailorResponse(content) — concatenates text-type blocks
            (reuses concatTextBlocks from stageBPrompt for drift defense
            if m3+ tailoring ever adds tool_use) → returns { markdown }
          · ParseError class + empty-text guard
          · Use stageBPrompt.extractBlocks() to pull Block E from
            data/career/reports/{jobId}.md (consumer side; m2 calls this
            via bundle helper)

        - scripts/smoke-tailor-prompt.mjs (~250 lines, ~14 assertions):
          · Module shape (TAILOR_MODEL, exports)
          · buildSystemBlock: ONE block with cache_control:ephemeral
          · System block contains all 4 sources (identity / base / proof / emphasize)
          · NO_FABRICATION_INSTRUCTION verbatim in system block
          · empty bundle → graceful placeholders, no throw
          · buildUserMessage: JD + Block E + optional hint render
          · userHint=undefined skips hint section
          · JD body trim to 12000
          · Block E text trim to 4000 (defensive against absurd Block E)
          · buildTailorPrompt model+max_tokens+no-tools shape
          · parseTailorResponse extracts markdown from text-type content[]
          · parseTailorResponse throws ParseError on empty
          · parseTailorResponse ignores tool_use blocks (forward-compat)
          · ParseError exported

      Locked design (Phase 2.5 OQ lock-ins):
        - OQ-2 = yes: proof-points.md included in cached system block
          alongside base.md (full fact-source corpus for safety constraint)
        - Single cache_control block per Stage B m1 pattern
        - Reuse stageBPrompt's concatTextBlocks (single source of truth)
        - Reuse stageBPrompt's extractBlocks for Block E extraction (m2
          consumer; m1 just exports the prompt builder)

      验收: smoke 14/14 PASS; tsc + vite build clean.

  - id: "m2-tailor-runner"
    name: "tailorRunner.mjs — single-job orchestrator + loadTailorBundle"
    status: completed
    estimated_files:
      - "src/career/cv/tailorRunner.mjs"
      - "src/career/cv/tailorBundle.mjs"
      - "scripts/smoke-tailor-runner.mjs"
    estimated_lines: 250
    depends_on: ["m1-tailor-prompt-module"]
    complexity_flags: ["external_api", "error_handling_heavy"]
    open_questions: []
    description: |
      Tailor orchestrator mirroring stageBRunner shape (DI seam, callWithRetry
      on 5xx/429/408, NEVER throws). Single-job — no batch (per spec, tailor
      runs one Job at a time on user click). Atomic-write output.

      Files:
        - src/career/cv/tailorBundle.mjs (~80 lines):
          · loadTailorBundle(resumeId, jobId) → { identity, baseMd,
            proofPoints, emphasize, blockEText }
          · Reads resumes/{resumeId}/base.md + resumes/{resumeId}/metadata.yml
          · Reads data/career/proof-points.md + identity.yml (graceful fallback)
          · Reads data/career/reports/{jobId}.md → extractBlocks → blocks.E
          · ALL graceful on ENOENT (missing file → ''); YAML parse fail → {}
          · Reuses cvBundle.mjs read patterns (deferred to its own module
            for reuse; not extending cvBundle which is Stage-B-bundle-shaped)

        - src/career/cv/tailorRunner.mjs (~170 lines):
          · TAILOR_CALLER = 'cv-tailor'
          · OUTPUT_DIR = data/career/output
          · RESUME_ID_RE = /^[a-z0-9-]{1,40}$/ (matches existing)
          · JOB_ID_RE = /^[a-f0-9]{12}$/
          · DEFAULT_DEPS: { client, recordCost, sleep, writeOutput }
          · defaultRecordCost — appends to llm-costs.jsonl with
            caller='cv-tailor' (NO web_search / tool_rounds — single-turn)
          · defaultWriteOutput(jobId, resumeId, content) — validates BOTH
            ids against regex (path-traversal defense per Stage B review
            lessons), atomic tmp+rename, returns
            'data/career/output/{jobId}-{resumeId}.md' (forward-slash)
          · isRetryableError + callWithRetry copy from stageBRunner
            (could refactor to shared helper; defer to cleanup pass)
          · tailorOneJob(jobMeta, resumeId, userHint, deps) — full lifecycle:
            shouldRun guard → loadTailorBundle → buildTailorPrompt →
            callWithRetry(client.messages.create) → record cost → parse →
            write output atomically → return { jobId, resumeId,
            tailored_markdown, output_path, model, cost_usd, status:
            'tailored'|'error', error? }
          · NEVER throws; per-call errors absorbed
          · Idempotency: NONE (per OQ-4 = overwrite; user-driven re-run
            with hint is the expected path; output is uniquely keyed by
            (jobId, resumeId) so concurrent re-runs are safe-overwrite)

        - scripts/smoke-tailor-runner.mjs (~200 lines, ~12 assertions):
          DI-driven: empty hint / happy path / 429 retry / 5xx retry /
          408 retry / 401 fast-fail / parse error → cost recorded /
          writeOutput throw → cost recorded / cost record carries
          caller='cv-tailor' / cost record throw → eval still succeeds /
          jobId path-traversal blocked / resumeId path-traversal blocked

      Locked design:
        - No batch — tailor is per-Job, user-driven (different from Stage A/B)
        - No mutex — output file uniquely keyed by (jobId, resumeId);
          concurrent re-runs just overwrite (atomic rename guarantees
          on-disk consistency)
        - OQ-4 = overwrite policy: re-run replaces previous tailored
          markdown; user can save approved version externally
        - Cost recording via shared computeCostUsd from anthropicPricing;
          claude-sonnet-4-6 already in MODEL_PRICING

      验收: smoke 12/12 PASS.

  - id: "m3-schema-and-endpoint"
    name: "POST /api/career/cv/tailor + GET output endpoint"
    status: pending
    estimated_files:
      - "server.mjs"
      - "scripts/smoke-tailor-endpoint.mjs"
    estimated_lines: 200
    depends_on: ["m2-tailor-runner"]
    complexity_flags: ["design_decisions"]
    open_questions: []
    description: |
      HTTP surface. Endpoint integrates Auto-Select fallback for resumeId.
      Single-call orchestration; no pipelineMutex needed (read-only on
      pipeline.json; output file uniquely keyed).

      Files:
        - server.mjs (+~150 lines):
          · TailorRequestSchema = z.object({
              jobId: z.string().regex(JOB_ID_RE),
              resumeId: z.string().regex(RESUME_ID_RE).optional(),
              userHint: z.string().max(2000).optional(),
            })
          · TAILOR_OUTPUT_DIR = path.resolve('data','career','output')
          · POST /api/career/cv/tailor:
            - 400 on zod validation fail
            - 404 if pipeline.json missing OR jobId not found in pipeline
            - 412 (Precondition Failed) if job has no stage_b report
              (cannot tailor without Block E)
            - Resolve resumeId via Auto-Select fallback when missing:
              call existing scoreResumeAgainstJd against job.description
              + role; pick top match (or default fallback)
            - Validate resumeId exists in resume index (404 otherwise)
            - Call tailorOneJob → return { tailored_markdown,
              base_markdown, output_path, cost_usd, model, picked_resume_id,
              picked_reason }
            - On runner error → 502 (Bad Gateway) with error detail; cost
              record already written by runner
          · GET /api/career/cv/tailor/output/:jobId/:resumeId:
            - Validate BOTH ids against regex (path traversal guard)
            - Build path from validated ids (NOT stored path) — same
              defense pattern as Stage B m4 /report endpoint
            - Read content from disk; 404 if missing
            - Return { content, jobId, resumeId }
          · No mutex — single-job, output uniquely keyed; UI prevents
            concurrent clicks with a 'running' state

        - scripts/smoke-tailor-endpoint.mjs (~250 lines, ~10 assertions):
          server-spawn pattern with MOCK_ANTHROPIC=1. Cases:
          - Happy path: explicit resumeId → tailored markdown returned
          - resumeId omitted → Auto-Select fallback resolves it
          - 400 invalid body / 404 missing pipeline / 404 jobId not found /
            412 job has no stage_b / 404 resumeId not in index
          - GET /output/:jobId/:resumeId 200 with content
          - GET /output/:jobId/:resumeId 400 on malformed jobId or resumeId
          - GET /output/:jobId/:resumeId 404 when file missing on disk
          - Path-traversal: pipeline.json with malicious jobId/resumeId
            does NOT escape OUTPUT_DIR

      Locked design:
        - 412 Precondition Failed when job has no stage_b — Tailor depends
          on Block E from Stage B's report
        - resumeId resolution: explicit > auto-select > default fallback
        - Path-traversal defense: build paths from validated ids only
        - Per-call response includes base_markdown so UI can render diff
          without a second fetch

      验收: smoke 10/10 PASS.

  - id: "m4-ui-and-room-complete"
    name: "TailorPanel + DiffViewer + Pipeline integration + ROOM COMPLETE"
    status: pending
    estimated_files:
