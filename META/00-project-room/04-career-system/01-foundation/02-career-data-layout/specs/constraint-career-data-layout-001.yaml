spec_id: "constraint-career-data-layout-001"
type: constraint
state: active
intent:
  summary: "data/career/** 默认 gitignored，只有白名单配置/知识文件才 commit"
  detail: |
    MUST gitignored（个人敏感 / 易变 / 大量数据）：identity.yml / resumes/{id}/base.md / resumes/{id}/versions/ / qa-bank/legal.yml / qa-bank/history.jsonl / applications.json / reports/* / output/* / drafts/* / pipeline.json / scan-history.jsonl / .oauth.json / .playwright/ / feedback/* / apply-sessions/*。MUST committed（配置 + 可复用知识）：preferences.yml / portals.yml / narrative.md / proof-points.md / qa-bank/templates.md / story-bank.md / resumes/index.yml / resumes/{id}/metadata.yml / site-adapters/*.yml / cv.gdoc-id。任何时候新加文件必须显式归入一类，不能默认裸露。原因：identity 含电话/邮箱/visa（绝不 push public）；preferences 只有偏好（泄露无所谓，反而 git 能追踪演化）。
constraints: []
indexing:
  type: constraint
  priority: high
  layer: feature
  domain: "04-career-system"
  tags: [gitignore, security, privacy]
provenance:
  source_type: architecture_doc
  confidence: 0.9
  source_ref: "career-architecture/data-model.md#Git 策略"
relations: []
anchors: []
