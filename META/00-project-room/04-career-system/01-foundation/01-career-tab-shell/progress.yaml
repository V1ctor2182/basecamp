    description: |
      CareerNav 组件渲染水平 tab bar（Overview / Pipeline / Shortlist / Applied / Prep /
      Settings），active state 用 useMatch。CareerApp.tsx 的 Routes 加 6 个顶级：
      /career/overview → Overview, /pipeline → Pipeline, /shortlist → Shortlist,
      /applied → Applied, /prep/:company? → Prep, /settings/* → SettingsLayout
