milestones:
  - id: "m1-event-aggregator-endpoints"
    name: "Event aggregator + 5 REST endpoints + smoke"
    status: completed
    commit: "6a989dc2d5491194f21b27de43190d91b93be53b"
    estimated_files:
      - "src/career/iteration/eventStream.mjs"
      - "src/career/iteration/promote.mjs"
      - "server.mjs"   # 5 new endpoints
      - "scripts/smoke-iteration-endpoints.mjs"
    estimated_lines: 400   # spec ~120 server; corrected 3.3× for 5-store aggregation
    depends_on: []
    complexity_flags:
      - "design_decisions"   # event normalization shape, promote stub shape
    open_questions: []  # all locked at plan-milestones — see status_note
    description: |
      Backend aggregator reads existing append-only stores (feedback/site-failures
      + field-edits + field-misclassified + suggested/*.json + eval-fixtures/
      tuner-log.json + apply-sessions/*) and normalizes to a unified Event
      timeline `{ ts, kind, ref?, summary, payload }`. No new store written
      (Q2 override). 5 endpoints:
        GET  /api/career/iteration/health         — counts + rates
        GET  /api/career/iteration/events?limit&before_ts  — paginated stream
        GET  /api/career/iteration/pending        — promote queue + PR review
        GET  /api/career/iteration/coverage       — fixtures + qa-bank cats
        POST /api/career/iteration/promote/:id    — site-failure → fixture stub
      Promote creates `data/career/eval-fixtures/{vendor-slug}.truth.yml` with
      url + reason metadata only; HTML is filled in later via capture-fixture
      (operator manual step). Smoke: contract tests for each endpoint + the
      promote idempotency / duplicate-id refusal.

  - id: "m2-iteration-page-event-stream"
    name: "Iteration.tsx route + Health header + Event stream + Pending Actions"
    status: completed
    estimated_files:
      - "src/career/Iteration.tsx"
      - "src/career/iteration.css"
      - "src/career/CareerNav.tsx"   # add new nav entry
      - "src/career/App.tsx"   # add route
      - "scripts/smoke-iteration-tsx-build.mjs"   # vite build verifies the page mounts
    estimated_lines: 440   # spec ~280 React + 80 css; corrected 1.4×
    depends_on: ["m1-event-aggregator-endpoints"]
    complexity_flags:
      - "design_decisions"   # event-card layout, polling cadence, abort cleanup
    open_questions: []
    description: |
      New page at `/career/iteration`. Three top sections (D + E deferred to m3
      / out-of-scope):
        A. Health header — APPLY count / SUCCESS rate / 01 cover / 02 cache
           hit / Pending counts. Reuses .c-resumes-* / ov-* tokens.
        B. Event stream — paginated 30/page, infinite scroll on bottom, color
           tier per event.kind (🟢 / 🟡 / 🔵 / 🟠 / 🔴 / 🟣 / 🟤 / ⚪) reusing
           STATUS_COLORS (D1). formatRelative for timestamps.
        C. Pending Actions queue — Promote (count + first 5) / PR review (link
           to GitHub PRs labeled `tuner-output`) / Tier 2 (0) / Tier 3 (0)
           with tooltip explaining placeholder.
      30s polling via setInterval, AbortController cleanup on unmount (D2).
      0 LLM call on render (D5).

  - id: "m3-promote-modal-coverage-room-complete"
    name: "Promote modal + Coverage detail + smoke + ROOM COMPLETE"
    status: pending
    estimated_files:
      - "src/career/Iteration.tsx"   # promote modal + D section
      - "src/career/iteration.css"
      - "scripts/smoke-iteration-promote.mjs"
      - "META/00-project-room/04-career-system/07-applier/self-iteration/03-iteration-dashboard/spec.md"
      - "src/career/iteration/README.md"
    estimated_lines: 200   # spec ~150 React + 50 smoke
    depends_on: ["m2-iteration-page-event-stream"]
    complexity_flags:
      - "design_decisions"   # promote modal copy + Tier 2/3 tooltip wording
    open_questions: []
    description: |
      Promote modal: clicking a Promote-action item opens a dialog showing
      the auto-drafted truth.yml stub (url + vendor + reason from
      site-failures.jsonl); user reviews → confirms → POST /promote/:id;
      success toast tells operator to run `node scripts/capture-fixture.mjs`
      with the same URL to fill the HTML. Confirms D3 gate (review-before-
      write). D section (coverage detail): collapsible table reusing the
      site-coverage data m2 of 02-data-flywheel already exposes — per-vendor
      counts + leaked-roles diagnostics. Smoke covers modal mount + confirm
      flow + the promote endpoint integration. ROOM COMPLETE rollup.

