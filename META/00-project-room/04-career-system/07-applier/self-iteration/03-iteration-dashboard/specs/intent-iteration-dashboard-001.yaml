open_questions:
  - id: "Q1-tuner-trigger"
    question: "Dashboard 是否需要 [Run Tuner] 按钮触发 tuner？"
    options: ["否, 只 link 到命令", "是, POST API 后台跑"]
    lock_before: "plan-milestones"
    recommendation: "否 — tuner 是 IO-heavy, Claude Code terminal 跑更可观察 (constraint D4)"
  - id: "Q2-event-stream-storage"
    question: "事件流的 backing store 是 SQLite / JSONL append-only / qa-bank+evidence 实时聚合？"
    options: ["SQLite", "JSONL append-only", "实时聚合 (无 store)"]
    lock_before: "plan-milestones"
    recommendation: "JSONL append-only (matches existing llm-costs.jsonl pattern, easy to GC + grep)"
  - id: "Q3-pending-action-routing"
    question: "Pending action 队列点击后跳哪？"
    options: ["都跳 dashboard 内 modal", "跳 GitHub PR (tuner) / fixture editor (promote) / 各种独立 page"]
    lock_before: "plan-milestones"
    recommendation: "混合 — Promote 内 modal (本地操作), PR review 跳 GitHub (外部协作)"
