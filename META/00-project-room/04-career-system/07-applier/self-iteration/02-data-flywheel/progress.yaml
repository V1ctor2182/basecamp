status_note: "🟢 m3 COMPLETE 2026-05-18. Approve/reject seam shipped: applySuggestion.mjs (~370 LOC) — approveSuggestion / rejectSuggestion wrap a per-id mutex via serializeByKey (REVIEW C1/C3 critical: pre-fix concurrent approve+reject for the same id both passed the status-flip TOCTOU and duplicated rule rows / raced YAML writes); _applyClassifierRule appends to learned-classifier-rules.yml + reloads classifier extras live (REVIEW C2 critical: pre-fix YAML parse failure silently reset rules to [], wiping all prior approvals; now backs up to .corrupt-{ts} and throws 500); proposal_id dedup makes retries idempotent (REVIEW C2 adv); _applySiteAdapter re-validates against SiteAdapterSchema before write (REVIEW H5 adv: pre-fix a corrupted envelope could brick the loader at next boot) + clamps priority to ≤100 (REVIEW H6 adv: prevents priority=9999 shadowing bundled adapters) + refuses reserved ids (`default`, `_common`) + refuses overwriting pre-existing bundled YAML (REVIEW C1 Plan: pre-fix could silently replace workday.yml etc); rejectSuggestion serializeByKey(REJECTED_IDS_FILE) inner mutex (REVIEW H1 Plan); LearnedRuleRowSchema dropped .strict() so future m4 columns don't invalidate existing rows (REVIEW H4 adv); tmp filenames suffixed with randomUUID (REVIEW M1 adv: pre-fix process.pid-only could collide on intra-process concurrent writes). server.mjs (+120 LOC) 5 REST routes: GET /api/career/feedback/suggestions[?status] / GET /:id / POST /:id/approve / POST /:id/reject / GET /stats. SUGGESTION_ID_RE tightened to case-sensitive `/^[a-z0-9_-]{1,120}$/` per REVIEW H3 adv (pre-fix /i flag created split-brain between case-insensitive macOS FS and case-sensitive Linux prod). data/career/feedback/learned-classifier-rules.yml seeded empty. ensureLearnedRulesLoaded top-level-awaited at module load (mirrors siteAdapter.mjs pattern). Plan-agent + adversarial review: 4 CRITICAL + 6 HIGH + 1 MEDIUM applied — every fix has REVIEW-named regression. Smoke 25/25 green (17 baseline + 8 review regressions including concurrent approve/reject mutex test, dedup idempotency, schema re-validation, priority clamp, reserved-id refusal, corrupt-file backup). Regression: 04-multi-step 153/153 + 05 nonstandard 157/157 + 06 site-adapters 81/81 + 03 field-classifier 95/95 + feedback m1 24/24 + m2 26/26 still green. Loop closure verified end-to-end: m2 induce → m3 approve → classifyField sees live rule (no restart) AND m2 induce → m3 reject → m2 maybeInduce skips re-induction. Next: m4 Learning tab UI + stats endpoints + ROOM COMPLETE."

