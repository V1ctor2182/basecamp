anchors:
  - file: "src/career/applier/draftsStore.mjs"
    description: "Mode 1 m1: NEW pure-Node ESM store. Zod DraftSchema (jobId `^[a-f0-9]{12}$` regex; fields min(1)/max(50) of DraftFieldSchema; generated_at ISO datetime; model string; cost_usd nonnegative+finite; .strict()). Zod DraftFieldSchema (label 1-200 chars; class enum FIELD_CLASSES=['hard','legal','open','file']; suggested_value max 4000 chars; confidence enum CONFIDENCE_TIERS=['high','medium','low']; source_ref optional max 200 chars; .strict()). Constants frozen. Atomic CRUD via .tmp+fs.rename (precedent: applications/store.mjs and scanRunner.atomicWriteJson). Public API: readDraft(jobId) returns null on ENOENT / writeDraft(jobId, draft) with jobId vs draft.jobId mismatch guard before Zod parse / deleteDraft(jobId) idempotent (ENOENT swallowed; EACCES/EISDIR rethrown) / listDraftJobIds() returns regex-anchored 12-hex jobIds (filters orphan/temp/unrelated files)."
  - file: "scripts/smoke-drafts-store.mjs"
    description: "Mode 1 m1 smoke: 12 pure-Node asserts. Schema accept/reject (4 cases) / .strict() rejects unknown fields / DraftSchema rejects empty fields array / constants frozen / readDraft ENOENT → null / writeDraft → readDraft Zod round-trip / writeDraft jobId mismatch guard fires / schema-violation write leaves no .tmp orphans / listDraftJobIds regex-filters orphan files (README.md / NOT_HEX) / deleteDraft idempotent (double-delete OK) / public API throws TypeError on bad jobId."
  - file: "src/career/applier/draftPrompt.mjs"
    description: "Mode 1 m2: NEW prompt builder + parser. APPLIER_MODEL=claude-sonnet-4-6. Frozen CANONICAL_QUESTIONS (8-10 ATS standard + JD-specific bonus). 4-class taxonomy + 3-tier confidence rubric inlined into DRAFT_INSTRUCTIONS_HEAD with explicit JSON output contract (no markdown fence). buildSystemBlock(bundle) emits ONE text block w/ cache_control:ephemeral containing Block A/E report + flattened legal.yml + templates.md + identity.yml + history.jsonl 5-most-recent few-shot (CONTRACT: caller passes newest-first). buildUserMessage(job, opts) threads pdfPath separately so Sonnet emits class='file' field correctly. buildDraftPrompt assembles params (max_tokens=4096). parseDraftResponse: brace-balanced regex extraction tolerant of ```json wrap (with fallback when fence content lacks `{`) + preamble; per-field Zod validation with field-index error message."
  - file: "src/career/applier/draftRunner.mjs"
    description: "Mode 1 m2: NEW runner. generateDraft(job, bundle, opts) NEVER throws — every failure mode lands as {jobId, status:'error', error:'api:|parse:|validate: ...'}. Cost recorded BEFORE parse (preserved on parse-failure path so 04-budget-gate accounting honors actual API spend); caller='applier:draft' for separate budget line from evaluator:stage-b. callWithRetry: 3 attempts (base + 2 retries) on 429/5xx/APIConnectionError. DI seam (_client/_recordCost/_sleep) for smokes. Mirrors stageBRunner pattern but scoped to single-job (no batch worker pool)."
  - file: "scripts/smoke-draft-prompt.mjs"
    description: "Mode 1 m2 smoke: 16 in-process asserts with injectable mock client. Module exports + frozen constants / buildSystemBlock cache+text shape + graceful empty fallbacks + history slice(0,5) cap / buildUserMessage pdfPath conditional / buildDraftPrompt model+tokens+system+messages / parseDraftResponse tolerates ```json``` fence + preamble / ParseError on empty + garbage / Zod rejects bad class / concatTextBlocks stitches text-only / generateDraft success path + degenerate parse → status='error' (cost preserved) + API failure → status='error' (cost=0)."
  - file: "src/career/applier/applierBundle.mjs"
    description: "Mode 1 m3: NEW loader for Mode 1 draft inputs from disk. loadApplierBundle(jobId) reads reports/{jobId}.md (Block A/E personalization seed) + qa-bank/legal.yml (parsed) + qa-bank/templates.md + identity.yml (parsed) + qa-bank/history.jsonl (last 5 NEWEST-FIRST per draftPrompt contract — slice(-5).reverse()) + Tailor PDF latest by mtime via /^{jobId}-([a-z0-9-]{1,40})\\.pdf$/ regex. Returns {reportText, legalYml, templatesText, identityYml, qaHistory, pdfPath, reportExists}. Defensive: every individual file read is graceful on ENOENT / parse-error → '' / {} / []. The endpoint checks reportExists===false → 404 with hint."
  - file: "server.mjs"
    description: "Mode 1 m3: 2 endpoints. POST /api/career/apply/draft — Zod ApplyDraftBodySchema.strict() (jobId 12-hex regex + force optional); 402 budget gate (parallels Stage B/Tailor; force=true override); 404 on missing pipeline/job/Stage B report (with actionable 'Run Stage B from /career/pipeline first' hint); calls draftRunner.generateDraft (NEVER throws); on result.status='error' → 502 with detail+cost; persists via draftsStore.writeDraft (Zod-validated again — defense in depth); 200 returns full DraftSchema shape. Outer try/catch matches Stage B+Tailor convention so EACCES/EMFILE inside loadApplierBundle returns JSON 500 not Express HTML stack trace (review fix H1). GET /api/career/apply/draft/:jobId — regex 400 / readDraft Zod-fail 500 / missing 404 / 200 returns stored draft."
  - file: "scripts/smoke-apply-draft-endpoint.mjs"
    description: "Mode 1 m3 smoke: 9 server-spawn asserts (port 4595, MOCK_ANTHROPIC=1). POST bad jobId regex → 400 / paused budget no force → 402 with banner / pipeline absent → 404 / job not in pipeline → 404 / Stage B report missing → 404 with hint / wiring path (MOCK_ANTHROPIC degenerate) → 502 with parse: detail / force=true bypasses 402 hits runner → 502 / GET round-trip via direct writeDraft → 200 returns persisted draft / GET regex 400 + missing 404."
