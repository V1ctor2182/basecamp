status_note: "🎉 07-applier EPIC-NODE COMPLETE 2026-05-18 (8/8 children ✅). self-iteration/03-iteration-dashboard ROOM COMPLETE 2026-05-18 closes out the sub-epic (3/3 子 Rooms ✅). 3 milestones, 31 smoke asserts green: m1 event aggregator (eventStream.mjs reads 7 stores) + 5 REST endpoints (server.mjs +110 LOC) + promote-evidence flow writes stubs to gitignored data/career/eval-fixtures/promote-queue/, m2 Iteration.tsx page (Health + paginated event stream + Pending Actions) + 30s polling + composite (ts,id) cursor pagination + tsconfig.app.json fix (was pulling sibling repos), m3 Promote modal (D3 review-truth-yml gate) + Coverage detail collapsible + ROOM COMPLETE. 3 plan-milestones overrides locked: real-time aggregate vs new events.jsonl (avoids modifying frozen 01+02 code), promote writes stub only (operator runs capture-fixture manually), Tier 2/3 placeholder (acceptance c explicitly descoped). 0 CRITICAL + 4 HIGH (concurrent-promote race → per-id mutex, pagination ts-tie skip → composite cursor, poll-vs-load-more race → setState-time guard, fetchMore unmount abort → controller ref) + 4 MEDIUM (double JSONL scan, gitignore promote-queue, EventKind exhaustiveness, applications.json findLast Node version) review fixes with REVIEW-named regression tests. self-iteration/01-code-calibration ROOM COMPLETE 2026-05-18 (4/4 milestones, 131/131 smoke green = 45 fixtures + 37 runner + 33 tuner + 16 CI smoke). Calibration infrastructure for snapshot.mjs INTERACTIVE_ROLES: m1 schema/loader/capture + 3 seed fixtures, m2 eval runner + 3-dim score (coverage/noise/aria_accuracy) + CLI, m3 deterministic greedy tuner + ≤5% per-fixture regression gate (EH2) + reviewable diff (EH5) + iteration log, m4 npm scripts + CI smoke (`npm run test:eval-snapshot`) + README. EH1 deterministic verified across processes. End-to-end: 3 seeds → baseline aggregate min=0% → tuner accepts `remove link` → min=57% in 1 iteration. ~7 CRITICAL + ~16 HIGH + ~13 MEDIUM review fixes applied with REVIEW-named regression tests. self-iteration/02-data-flywheel ROOM COMPLETE 2026-05-18 (4/4 milestones, 97/97 smoke green = m1 24 + m2 26 + m3 25 + m4 12 stats + 10 UI build-verified). 4 capture hooks across apply lifecycle (endpoint approve-step + error path + classifier reclassify hook). Haiku induction worker w/ Sonnet retry + per-feedbackType mutex + threshold(5) gating + record-expiry reset. Approve/reject seam with per-id mutex serializing read-apply-flip transaction; classifier rules append to learned-classifier-rules.yml + register live; site-adapter proposals validated against SiteAdapterSchema + clamped to priority ≤100 + refuse reserved/pre-existing ids. Learning tab UI (React + Nivo line) with 4 cards (30d stats / 14d error trend / pending suggestions w/ approve+reject / site coverage table). Plan-agent + adversarial review across 4 milestones: ~13 CRITICAL + ~20 HIGH + ~10 MEDIUM all applied — every fix has REVIEW-named regression. End-to-end loop closure: induce → approve → live classifier rule (no restart); induce → reject → m2 skip re-induction. Original 07-applier: 06-site-adapters ROOM COMPLETE 2026-05-16 (3/3 milestones). YAML-driven per-ATS configuration shipped: m1 schema/loader/detector + 5 simple ATS YAMLs (greenhouse/ashby/lever/default/_common, smoke 29/29). m2 activateAdapter pushes adapter.controls into 05 DETECTION_RULES via UNSHIFT (critical: append would put adapter rules AFTER baseline so they'd never override) + adapter.known_fields prepended to 03 classifier via registerExtraRules seam (smoke 23/23). m3 migration: multistep/siteAdapter.mjs (was inline registry) → thin facade over m1 loader (top-level await + try/catch fallback registry per REVIEW C3), 3 multi-step YAMLs (workday/icims/successfactors), endpoint.mjs.startMachine activates adapter before runMachine + reverts in finally (per-apply isolation), __SMOKE_skipAdapterActivation harness flag. Greenhouse/Ashby/Lever URLs collapse to legacy 'generic' for multi-step machine but getCompiledA