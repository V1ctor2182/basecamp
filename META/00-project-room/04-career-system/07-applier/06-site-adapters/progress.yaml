milestones:
  - id: "m1-schema-loader-detector-simple-yamls"
    name: "SiteAdapter Zod schema + YAML loader + URL detector + 5 simple bundled YAMLs (_common/default/greenhouse/ashby/lever)"
    status: completed
    estimated_files:
      - "src/career/applier/siteAdapters/schema.mjs"
      - "src/career/applier/siteAdapters/loader.mjs"
      - "src/career/applier/siteAdapters/detector.mjs"
      - "data/career/site-adapters/_common.yml"
      - "data/career/site-adapters/default.yml"
      - "data/career/site-adapters/greenhouse.yml"
      - "data/career/site-adapters/ashby.yml"
      - "data/career/site-adapters/lever.yml"
      - "scripts/smoke-site-adapters-loader.mjs"
    estimated_lines: 580
    depends_on: []
    complexity_flags: ["design_decisions"]
    open_questions: []
    description: |
      Foundation: Zod schema + loader + URL detector + 5 simple-ATS YAMLs.
      No integration yet (m2 wires into 05/03; m3 migrates 04-m2 inline).

      Locked design (OQ1 + OQ4):
        - OQ1 YAML distribution: 5 YAMLs in m1 (_common + default +
          greenhouse + ashby + lever — all single-step flows per spec
          "初版只确保 Greenhouse / Ashby / Lever 3 个工作"). The 3
          multi-step YAMLs (workday/icims/successfactors) land in m3
          when the multi-step flow.next_button.selectors path is
          actually consumed.
        - OQ4 detection signal: URL-only in m1. Schema accepts a
          `dom_signatures: selector[]` field but loader does NOT consume
          it yet (Phase 2 / 飞轮). DOM signature checking would require
          a Page reference at detection time (async) and complicate the
          API for marginal gain — Greenhouse/Ashby/Lever/Workday/iCIMS
          all URL-detectable from job listing links.

      Files:
        - src/career/applier/siteAdapters/schema.mjs (~110 LOC):
          · Zod SiteAdapterSchema strict — fields: name / id / priority /
            detection {url_patterns, dom_signatures} / flow {type,
            next_button, submit_button, progress_bar, step_list} /
            controls {date_picker, address_autocomplete, custom_dropdown,
            file_upload} / known_fields[] / quirks[]
          · ControlHintSchema: control_type + detect {class_contains,
            tag_name, aria_role}
          · KnownFieldSchema: label_pattern (regex source) + class +
            maps_to + confidence
          · compileAdapter(raw) → compiled with url_patterns + label_patterns
            pre-compiled to RegExp /i

        - src/career/applier/siteAdapters/loader.mjs (~100 LOC):
          · loadAdaptersFromDir(dir) → { adapters[], common, default }
          · js-yaml parse + Zod validate; mtime-based cache
          · Error: malformed YAML → throw with file path; ZodError
            wrapped with adapter id

        - src/career/applier/siteAdapters/detector.mjs (~70 LOC):
          · detectSiteAdapter(jobUrl, registry) → CompiledAdapter
          · URL parsing via new URL(); hostname match; raw-string fallback
          · Priority-DESC iteration; default.yml priority=0 lowest fallback
          · Never returns null (default catches everything)

        - data/career/site-adapters/_common.yml (~30 LOC):
            shared next_button/submit_button name_hints merged into
            every adapter at load time

        - data/career/site-adapters/default.yml (~25 LOC):
            id=default, priority=0, url_patterns=['.*']

        - data/career/site-adapters/greenhouse.yml (~50 LOC):
            id=greenhouse, priority=100, url_patterns boards.greenhouse.io,
            single-step, submit_button selectors ['#submit_app'],
            known_fields seed (first_name etc.)

        - data/career/site-adapters/ashby.yml (~40 LOC):
            id=ashby, priority=100, url_patterns jobs.ashbyhq.com

        - data/career/site-adapters/lever.yml (~40 LOC):
            id=lever, priority=100, url_patterns jobs.lever.co

        - scripts/smoke-site-adapters-loader.mjs (~250 LOC, ~14 asserts):
          · Schema: required fields rejected, optional defaults applied
          · _common.yml NOT returned as adapter (filtered + merged)
          · _common merge: greenhouse inherits next_button name_hints
          · loader: bad YAML → throw with file path
          · loader: ZodError on malformed adapter
          · compileAdapter: url_patterns + label_patterns compiled /i
          · detector: greenhouse / ashby / lever / unknown / malformed-URL
          · detector: priority ordering (100 > 0 fallback)
          · loader caching: second load same mtime → reuses cache

      验收:
        - 14+ smoke green, pure-Node (<1s)
        - js-yaml usable as transitive dep (verify before m1 — already
          used by identityLookup.mjs / legalLookup.mjs)

  - id: "m2-activate-detection-rules-known-fields"
    name: "Adapter activation: push controls into 05 DETECTION_RULES + push known_fields into 03-classifier regex layer"
    status: completed
    estimated_files:
      - "src/career/applier/siteAdapters/activate.mjs"
      - "src/career/applier/classifier/regexRules.mjs"
      - "scripts/smoke-site-adapters-activate.mjs"
    estimated_lines: 450
    depends_on: ["m1-schema-loader-detector-simple-yamls"]
    complexity_flags: ["design_decisions"]
    open_questions: []
    description: |
      Wire the loaded adapter into the live system:
        (a) adapter.controls.{date_picker,...} → 05 DETECTION_RULES
        (b) adapter.known_fields → 03-classifier regex rule list (prepend)
      Both pluggable + reversible (deactivate cleans up).

      Locked design (OQ2):
        - known_fields semantics: AUGMENT (prepend), not OVERRIDE. Adapter
          known_fields try first; if none matches, classifier falls
          through to generic regex rules (regexRules.mjs). This is safer:
          a typo in adapter known_fields can't break generic detection;
          worst case it just doesn't fire.

      Files:
        - src/career/applier/siteAdapters/activate.mjs (~180 LOC):
          · activateAdapter(adapter) → DeactivationToken
              Side effects:
              1. For each adapter.controls.{category}: registerDetectionRule
                 on controlRouter.mjs's DETECTION_RULES.
                 Rule shape:
                   (entry, info, _classifiedField) => {
                     if (!info) return null
                     const hint = adapter.controls[category]
                     // ALL of {class_contains, tag_name, aria_role}
                     // provided must match. Returns hint.control_type on
                     // match, else null.
                   }
              2. For each adapter.known_fields: register on classifier's
                 extra-rules seam (regexRules registerExtraRules).
              3. Returns DeactivationToken { revert: () => void } that
                 removes EXACTLY the rules this activation added.
          · deactivateAdapter(token) — token.revert()
          · Module-level _activeTokens: Set<DeactivationToken> for
            diagnostics + revert-twice panic
          · Idempotent re-activation: caller's responsibility to
            deactivate first; isAdapterActive(adapterId) helper

        - src/career/applier/classifier/regexRules.mjs (~+40 LOC):
          · Add registerExtraRules(rules) + a token-based revert.
          · Existing HARD_PATTERNS / LEGAL_PATTERNS / etc unchanged.
          · classifyField prepends extra rules to the standard rule
            sweep so adapter known_fields fire first.

        - scripts/smoke-site-adapters-activate.mjs (~200 LOC, ~10 asserts):
          · activate greenhouse → DETECTION_RULES gains greenhouse
            entries → detectControlType on a date-picker ref returns
            greenhouse-preferred ControlType
          · deactivate via token → DETECTION_RULES back to baseline
          · double-deactivate → throws
          · known_fields prepend: classifier sees adapter rule first;
            falls through to generic if no match
          · stack: activate ashby on top of greenhouse → both sets of
            rules stack; deactivate ashby cleans up only ashby
          · isAdapterActive: tracks active set
          · adapter with NO controls → activation no-ops on 05;
            known_fields-only adapter still injects classifier rules
          · DETECTION_RULES signature contract honored (3-arg, returns
            ControlType | null)

      验收:
        - 10+ smoke green
        - activate/deactivate reversible; repeated cycles leave
          DETECTION_RULES + classifier regex lists at baseline

  - id: "m3-migrate-multi-step-yamls-endpoint-room-complete"
    name: "Migrate siteAdapter.mjs (04 m2) → new loader + 3 multi-step YAMLs (workday/icims/successfactors) + endpoint wiring + ROOM COMPLETE"
    status: pending
    estimated_files:
      - "src/career/applier/multistep/siteAdapter.mjs"
      - "src/career/applier/multistep/endpoint.mjs"
      - "data/career/site-adapters/workday.yml"
      - "data/career/site-adapters/icims.yml"
      - "data/career/site-adapters/successfactors.yml"
      - "scripts/smoke-site-adapters-migration-room-complete.mjs"
    estimated_lines: 600
    depends_on: ["m2-activate-detection-rules-known-fields"]
    complexity_flags: ["design_decisions", "error_handling_heavy"]
    open_questions: []
    description: |
      Migration + multi-step YAMLs + endpoint wiring + ROOM COMPLETE.

      Locked design (OQ3 + OQ1 multi-step YAMLs):
        - OQ3 migration: siteAdapter.mjs (04 m2, ~140 LOC) becomes a
          THIN RE-EXPORT from the new loader. Public API preserved
          (detectAdapter, getAdapter, resolveNextButtonHints,
          resolveProgressBarHints, resolveStepListHints,
          resolveSubmitHints, KNOWN_IDS, ADAPTERS). stepProbe.mjs
          imports unchanged. Inline ADAPTERS array removed — its 4
          entries (workday/icims/successfactors/generic) replaced by
          4 YAML files (workday/icims/successfactors/default).

      Files:
        - src/career/applier/multistep/siteAdapter.mjs (~80 LOC, was ~140):
          · Re-exports detectAdapter, KNOWN_IDS, getAdapter,
            resolveNextButtonHints, resolveProgressBarHints,
            resolveStepListHints, resolveSubmitHints from new loader,
            translating new schema's flow.next_button.name_hints to
            legacy nextButtonHints field name.
          · Eager-loads adapters at module import (synchronous boot —
            same as current behavior). Loader's loadAdaptersFromDir is
            async so siteAdapter.mjs exposes an async ensureInit() that
            endpoint.mjs awaits before first startMachine.

        - src/career/applier/multistep/endpoint.mjs (~+30 LOC):
          · startMachine: after detecting site adapter via
            detectSiteAdapter(jobUrl), call activateAdapter(adapter)
            BEFORE _runMachine; store DeactivationToken on running
            context; deactivate on completion (try/finally on success
            OR failure path).
          · _machineDeps.site_adapter override still honored for smoke.

        - data/career/site-adapters/workday.yml (~80 LOC):
            id=workday, priority=110, url_patterns myworkdayjobs.com,
            multi-step, controls.date_picker → mui_datepicker hint,
            known_fields work_auth/sponsorship, quirks notes

        - data/career/site-adapters/icims.yml (~60 LOC):
            id=icims, priority=110, url_patterns icims.com, multi-step,
            controls.address_autocomplete → google_places hint

        - data/career/site-adapters/successfactors.yml (~50 LOC):
            id=successfactors, priority=110, multi-step

        - scripts/smoke-site-adapters-migration-room-complete.mjs (~280
          LOC, ~12 asserts):
          · Migration: legacy detectAdapter('workday URL') still →
            'workday'; resolveNextButtonHints('workday') returns YAML's
            name_hints
          · existing smoke-multistep-site-adapter.mjs still green after
            migration (regression gate)
          · workday URL → activateAdapter pushes mui_datepicker hint
          · icims URL → google_places hint for address fields
          · greenhouse URL (single-step) → no progress_bar hints
          · activate+deactivate around runMachine: token reverted in
            try/finally even on machine error
          · _machineDeps.site_adapter override path works for smoke
          · E2E: mocked startMachine with workday URL → activateAdapter
            fired → _runMachine called with adapter context → deactivate
            on completion

      ROOM COMPLETE rollups:
        - room.yaml lifecycle: planning → active
        - _tree.yaml 06-site-adapters: planning → active
        - 07-applier parent: 75% → 88% (7/8 children ✅)
        - 04-career-system: 94% → 97% (30/34 features)

      下游 unblocked:
        - self-iteration/02-data-flywheel (累积同 domain 失败自动 propose
          new adapter YAML)
        - 08-human-gate-tracker (dashboard 显示 active adapter id)

      验收 (Room close):
        - 12+ migration smoke green
        - existing 04-multi-step smoke (43+37+30+43 = 153/153) STILL
          passes after migration
