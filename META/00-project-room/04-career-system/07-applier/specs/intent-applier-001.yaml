spec_id: "intent-applier-001"
type: intent
state: active
intent:
  summary: "ATS 填表：Mode 1 Simplify Hybrid + Mode 2 Full Agent + 飞轮学习"
  detail: |
    9 个 feature 组成的填表 agent 系统。**Mode 2 决策已 LOCKED 2026-05-11** —
    跳过 plan-ceo-review，直接全力实施 Mode 2 全部 sub-Rooms (02-09)。

    Rooms:
      (1) 01-mode1-simplify-hybrid — 开放题 draft + 用户 Simplify + 手动 Submit + Mark submitted（推荐日常用）✅ ROOM COMPLETE
      (2) 02-playwright-runtime — 独立 Chromium + 持久化 profile + 反检测底座（Mode 2 根基，0 deps，next to dev）
      (3) 03-field-classifier — 4 class 字段分类器（Hard/Legal/Open/File）路由到不同填充策略
      (4) 04-multi-step-state-machine — Workday / iCIMS 多步表单状态机 + 中断恢复
      (5) 05-non-standard-controls — 21 种控件策略 + 置信度分级 + Manual fallback
      (6) 06-site-adapters — 按 ATS domain 配特化策略的 yaml
      (7) 07-feedback-flywheel — 4 条回流数据驱动 Applier 越用越准（runtime 自迭代）
      (8) 08-snapshot-refs-layer — token-efficient LLM-facing 抽象（snapshot+refs 模式 port from Vercel agent-browser, ~93% token 节省）
      (9) 09-snapshot-eval-harness — ATS fixture corpus + 确定性 auto-tuner（dev-time 自迭代）

    核心铁律：永远不自动点 Submit（Human Gate）。消费 identity.yml / qa-bank /
    Tailor PDF / reports；产出 drafts/{jobId}.json + qa-bank/history.jsonl 回流。

    依赖图（决定开发顺序）:
      02 (0 deps)
        → 08 (deps 02)
          → 09 (deps 08)
            → 03 (deps 08+09)
              → 05 (deps 03+08)
                → 04 (deps 03+05+08)
                  → 06 (deps 03+04+05)
                    → 07-flywheel (deps 全部)
