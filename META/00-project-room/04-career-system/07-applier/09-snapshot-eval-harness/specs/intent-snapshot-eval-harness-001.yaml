open_questions:
  - id: "Q1-fixture-storage"
    question: "Fixture HTML 放 repo 里 (~300KB) 还是 LFS 还是单独 git submodule？"
    options: ["repo (≤500KB OK)", "git LFS (如果 corpus 长到 >2MB)", "submodule (过度工程)"]
    lock_before: "plan-milestones"
    recommendation: "repo — 10-15 fixture 总 ~300KB 可接受，避免 LFS 复杂度"
  - id: "Q2-score-aggregation"
    question: "Aggregate score 用 fixture 间 mean / median / min？影响 tuner 决策."
    options: ["mean (公平)", "median (抗 outlier)", "min (悲观, 防最坏 case)"]
    lock_before: "plan-milestones"
    recommendation: "min — 任何 fixture < 95% 都阻止收敛, 保证最差 ATS 也能用"
  - id: "Q3-tuner-rule-complexity"
    question: "Tuner 候选 fix 支持复合规则（如 'heading where level > 2'）还是只支持简单 add/remove role？"
    options: ["简单 only (V1)", "复合 (V2)", "无限制（容易过拟合）"]
    lock_before: "plan-milestones"
    recommendation: "简单 only V1; 复合规则等真 fixture 数据驱动需要再加"
