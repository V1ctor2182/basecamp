open_questions:
  - id: "Q1-iframe-format"
    question: "iframe 是 inline-recurse 进父 snapshot（V1 default）还是要 LLM 显式 `frame switch @fN` 命令？影响：inline 让 LLM 体验统一但 ref→frame 反查表复杂；显式 frame 更可控但 LLM 要管 frame 状态."
    options: ["inline-recurse (default)", "explicit frame switch", "hybrid: top-level inline + nested 显式"]
    lock_before: "plan-milestones"
  - id: "Q2-heading-inclusion"
    question: "Snapshot 是否保留 heading 节点作 LLM navigation aid？agent-browser 保留；纯交互角度可以过滤掉."
    options: ["keep (agent-browser parity)", "filter out (interactive-only strict)"]
    lock_before: "plan-milestones"
    recommendation: "keep — 帮 LLM 判断当前在哪一步页面，Workday 多步表单尤其需要"
  - id: "Q3-action-auto-wait-timeout"
    question: "click/fill 等动作默认 timeout 几秒？Playwright 默认 30s. ATS 页面慢可能要更长."
    options: ["5s", "10s", "30s (Playwright default)", "configurable per-action"]
    lock_before: "plan-milestones"
    recommendation: "10s default + per-action override 参数"
  - id: "Q4-no-accessible-name"
    question: "Icon button / image-only button 在 a11y 树里 name='' 的怎么 emit？skip / fallback aria-label / fallback title?"
    options: ["skip (LLM 看不见就不会用)", "fallback aria-label", "fallback title", "fallback to nearest text content"]
    lock_before: "plan-milestones"
    recommendation: "fallback aria-label → title → skip — Workday 大量用 icon button (X 关闭 / ? help)"
  - id: "Q5-drag-drop-upload"
    question: "Non-input file upload (drag-drop dropzone) V1 支持吗？需要 CDP Input.dispatchDragEvent."
    options: ["V1 不支持 (只 input[type=file])", "V1 支持 (~30 LOC CDP wrap)"]
    lock_before: "plan-milestones"
    recommendation: "V1 不支持 — Greenhouse/Lever 都用 input[type=file]，drag-drop 是 Workday 特有，归 06-site-adapters 处理"
  - id: "Q6-ref-id-format"
    question: "Ref ID 格式 `e1` (agent-browser parity) vs `[1]` vs `r1`?"
    options: ["e1 (agent-browser parity)", "[1]", "r1"]
    lock_before: "plan-milestones"
    recommendation: "e1 — 跟 agent-browser 一致便于人脑切换工具 + 借鉴它的 prompt example"
anchors:
  - file: "src/career/applier/runtime/snapshot.mjs"
    description: "m1: ~220 LOC. LLM-facing snapshot serializer via CDP Accessibility.getFullAXTree (Playwright v1.50+ removed page.accessibility — verified). INTERACTIVE_ROLES allowlist of 9 roles (Q2: heading kept). normalizeName() strips Unicode control + zero-width chars (M2 fix) applied to BOTH display and storage so getByRole matches. serializeNode() emits one-line `- role 'name' [ref=eN] [state?]` with [truncated] marker for names >80 chars (C1 fix). Per-CDPSession Accessibility.enable via WeakSet (H4 fix — was Page-keyed, wrong scope). Per-Page CDPSession cache evicts on page.on('close') (H3 fix). 15s SNAPSHOT_TIMEOUT race on getFullAXTree (M3 fix). EMITTED_STATES = ['required', 'checked', 'selected', 'expanded', 'disabled']. Occurrence-index per (role, name) pair for disambiguation (Q8)."
  - file: "src/career/applier/runtime/refTable.mjs"
    description: "m1: ~100 LOC. RefTable class — per-Page snapshot generation, monotonic eN counter. Constructor takes Page reference for cross-page misuse detection (M5 fix — resolve() throws WRONG_PAGE if called with foreign page). mint(role, name, occurrenceIndex, frameIdx=0) returns 'eN'; resolve() returns page.getByRole(role, { name, exact:true }).nth(occurrenceIndex). m2 will add generation counter for STALE_REF support and replace plain Error with SnapshotError class. frameIdx parameter present but unused in m1 (m2 will wire it for iframe inline-recurse)."
  - file: "src/career/applier/runtime/actions.mjs"
    description: "m1: ~70 LOC. Symbolic action API — only verbs LLM-facing tool surface exposes (per C1 constraint: raw page.locator/eval MUST NOT leak). m1 ships click + fill via locator.click({timeout}) / locator.fill({timeout}). Default 10s timeout (Q3), per-action override accepted via opts. Errors wrapped with refId + JSON.stringify'd name (L1 fix — was raw quotes, could break on names with embedded \"). m2 will replace plain Error with unified SnapshotError codes (ACTION_TIMEOUT / ELEMENT_GONE etc) and add pessimistic invalidation. m3 adds select/press/upload."
  - file: "scripts/smoke-snapshot-core.mjs"
    description: "m1 smoke: ~280 LOC, 12 asserts (up from 9 after review fixes). 1=allowlist 9 roles, 2=text contract + role coverage minimums + inferred-role lock for textbox (H1+H6 fixes), 3=non-interactive filter, 4=[required] state suffix, 5=click @submit fires onclick, 6=fill @email sets value, 7=UNKNOWN_REF on bad ref, 8=duplicate role+name → distinct refs + occurrenceIndex 0/1, 9=tight byte budget <800 (H2 fix — was 3200), 10=multi-page snapshot independence (M4 fix), 11=WRONG_PAGE cross-page misuse (M5 fix), 12=[truncated] marker on names >80 chars (C1 fix). Pure-Node SMOKE=1; fixture isolation backs up real .playwright/profile."
