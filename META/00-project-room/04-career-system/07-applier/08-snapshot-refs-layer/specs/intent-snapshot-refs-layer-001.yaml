spec_id: "intent-snapshot-refs-layer-001"
type: intent
state: active
intent:
  summary: "Token-efficient LLM-facing page abstraction — snapshot + symbolic refs (借鉴 Vercel agent-browser)"
  detail: |
    Mode 2 Full Agent 的 LLM-facing 抽象层，sits between 02-playwright-runtime
    (Chromium 底座) and 03-field-classifier / 04-multi-step-state-machine /
    05-non-standard-controls / 06-site-adapters (所有需要"看页面 → 决定动作"的
    消费者)。

    核心问题：传统 Playwright + LLM 方案让模型看到完整 a11y 树 / DOM dump
    (~7000-8000 tokens 每个 ATS apply 页面)，且模型要从 noise 里挑出 CSS
    selector / XPath 写回 prompt — token 贵 + 模型瞎猜 selector 出错率高。

    设计 (借鉴 vercel-labs/agent-browser 的 IP，不用其 Rust 二进制):
      (1) snapshot(page, interactive=true) — 遍历 page.accessibility.snapshot()
          过滤出 interactive roles {button, link, textbox, checkbox, radio,
          combobox, menuitem, tab, heading, ...}，每个 node 输出一行：
            - role "accessible-name" [ref=eN] [extra-attrs?]
          一整个 ATS apply 页面压到 200-400 tokens（~20× 节省）。
          [headings 是否保留为 LLM 导航锚点，见 open_questions Q2]
      (2) Ref table — 计数器 mint `eN`，server 端 Map { eN → ElementHandle }。
          作用域 = per-Page（跟 Playwright Page 生命周期对齐，Page 关闭/重定向
          整张表清空）。Snapshot 返回时同时 freeze 这张表为新一代 generation。
      (3) Symbolic action API — `click @e2`, `fill @e3 "value"`,
          `select @e4 "option"`, `press @e5 "Enter"`, `upload @e6 "/path.pdf"`
          —— resolve `@eN` → 内部 handle → 调用 Playwright 原生方法。模型
          NEVER sees DOM ids / classes / XPaths / coordinates。LLM tool
          surface 只暴露 ~10 个符号动词，**绝不暴露 page.locator / page.eval
          / 任何 raw Playwright API**（见 constraints C1）。
      (4) Invalidation — **pessimistic post-action invalidation 为主信号**:
          任何 mutating action (click/fill/press/upload/select) 完成后立刻把
          当前 ref table 标 stale。原因：Greenhouse/Lever/Ashby/Workday 全是
          SPA，用 history.pushState 路由，framenavigated/domcontentloaded
          都不 fire — 只有 post-action 信号能稳定捕捉 SPA 切换。**附加信号**:
          framenavigated（兜底 hard navigation）+ Page close（清整张表）。
          约定: snapshot → act → re-snapshot loop，每次 act 后必须 re-snapshot
          才能继续 act。
      (5) Stale-ref guard + 统一错误码 — 三类失败：
            STALE_REF      → 引用的 generation 已被 invalidate（act 后未 re-snapshot）
            UNKNOWN_REF    → eN 从未在任何 snapshot 出现过
            ELEMENT_GONE   → ref 对应的 ElementHandle 底层 node 已 detach
                             （Playwright 抛 TargetClosedError/ElementHandleError，
                             由 action wrapper catch 后翻译）
          三类一律附带 hint "call snapshot first"，避免模型瞎猜继续。
      (6) Daemon warmth — 长期常驻 Node process (server.mjs 内 module 单例)
          复用 Playwright browser context，每个 LLM tool call < 200ms (vs
          Playwright cold-start 1-2s)。
      (7) iframe handling — V1 默认 inline-recurse iframe content into 父
          snapshot，ref 用全局 eN 编号（不分 frame）；action resolve 时通过
          ref→frame 反查表找到正确 Frame 调 .click()。这让 LLM 看到统一视图，
          不用关心 frame 边界（Greenhouse 几乎所有 form 都在 iframe 里，
          强制 LLM 切 frame 体验差）。[最终格式见 open_questions Q1]

    Consumers (downstream Rooms):
      - 03-field-classifier: snapshot 输出喂给 Sonnet 分类器，得到字段 class
      - 04-multi-step-state-machine: 每步 snapshot 后 LLM 判断 "下一步 ref" /
        "页面变了，re-snapshot"
      - 05-non-standard-controls: 用 ref 定位非标控件 + 走特化策略
      - 06-site-adapters: site-specific snapshot 提示（如 Workday 给 ref 加
        step prefix，让 LLM 知道当前在 step 几）

    NOT in scope:
      - 反检测 / stealth (那是 02-playwright-runtime)
      - 视觉 fallback / multimodal screenshot 分析 (DOM-only V1；screenshot
        是单独的 explicit `screenshot @eN` 命令，不混入 snapshot 输出)
      - 跨 tab / 跨 window 状态同步 (single-page V1)
      - MCP server 包装 (defer to 07-feedback-flywheel 或单独 Room)
      - Drag-drop file upload (V1 只支持 input[type=file]；drag-drop 见
        open_questions Q5)

    Estimated complexity: ~300-500 LOC TypeScript (serializer + ref table +
    symbolic action wrappers + invalidation listener + iframe inline recurse +
    Playwright-error→统一错误码 wrapper) + ~150-200 LOC smoke (snapshot
    stability across mutations, ref resolve correctness, stale-ref error path,
    token-budget assertion, handle-leak assertion).

    验收：
      (a) 给一个真实 Greenhouse apply 页 URL (含 iframe), snapshot 输出
          < 500 tokens 且能让 Sonnet 100% 识别 8 个核心字段 (Name/Email/
          Phone/Resume/LinkedIn/Cover/EEO/Authorization)
      (b) Workday 最坏 case 单步 30-50 fields 页面，snapshot 输出 < 1500 tokens
      (c) ref click/fill 100% 命中 vs Playwright 直接 selector
      (d) DOM 变更后 stale ref 100% 触发 STALE_REF 错误（不 silent 误操作）;
          unknown ref 触发 UNKNOWN_REF; detached node 触发 ELEMENT_GONE
      (e) SPA 路由切换 (Greenhouse 主页 → form iframe) 后旧 ref 100% stale
      (f) 同 tab 8 次 snapshot → act → re-snapshot 循环，Playwright context
          内部 element-handle Map size 不单调增长 (no handle leak)
constraints:
  - id: "constraint-C1-llm-tool-surface"
    severity: must_not
    rule: "LLM tool surface MUST NOT expose raw Playwright API (page.locator / page.eval / page.$ / setInputFiles 等). 只暴露 ~10 个符号动词 (snapshot/click/fill/select/press/upload/screenshot/wait_navigation/wait_text/close). Fallback 通道一旦存在，模型会偷懒回去写 selector，整层抽象失效。"
  - id: "constraint-C2-snapshot-output-purity"
    severity: must_not
    rule: "Snapshot 输出 MUST NOT contain DOM id / class / XPath / CSS selector / inline-style / data-* 任意一种. 只允许: role / accessible-name / ref / 必要的 ARIA state (checked/selected/expanded/disabled/required)."
  - id: "constraint-C3-pessimistic-invalidation"
    severity: must
    rule: "MUST pessimistic invalidate ref table after every mutating action (click/fill/press/upload/select). 不依赖 framenavigated/domcontentloaded — SPA 路由会绕过它们."
  - id: "constraint-C4-unified-error-codes"
    severity: must
    rule: "Action wrapper MUST catch Playwright 原生 errors (TargetClosedError / ElementHandleError / Timeout) 并翻译成统一错误码 (STALE_REF / UNKNOWN_REF / ELEMENT_GONE / ACTION_TIMEOUT). 错误码 + hint 'call snapshot first' 喂给 LLM."
  - id: "constraint-C5-dom-only-v1"
    severity: must
    rule: "V1 MUST be DOM-only (snapshot 不含 screenshot bytes). Screenshot 是 explicit `screenshot @eN` 命令，不混入 snapshot 输出. Vision fallback 留给未来 Room."
  - id: "constraint-C6-no-auth-vault"
    severity: must_not
    rule: "MUST NOT 自写 credential vault. ATS 登录用 Playwright storage_state.json 持久化机制 (一次性 headful 手动登录 + 长期 cookie 持久化). 不端口 agent-browser 的 auth 命令，不存密码."
