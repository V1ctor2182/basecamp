    description: |
      在 Preferences.tsx 加 Section 7 Hard Filters + Preview dry-run。

      **locked decisions** (from plan-milestones Phase 3):
        - Q3=a: Preview dry-run 做 UI + 后端 stub API —— UI 先上，后端返
          mock 数据（后续 05-finder/03-dedupe-hard-filter 做完替换真实实现）

      **Preferences.tsx Section 7 Hard Filters** (~120 行):
        - Section 标题 "Hard Filters" + desc "按顺序短路评估 —— 上面规则命中
          立刻归档不进下游。顺序: source → company → title → location →
          seniority → posted_days → comp → jd_text"
        - 9 sub-sections，每个带 ordinal label "① source_filter" 等:
          1. ① source_filter — blocked_sources: TagInput
             (options hint: linkedin / indeed / glassdoor)
          2. ② company_blocklist — TagInput (公司名)
          3. ③ title_blocklist + title_allowlist — 2 TagInput 并列
             （help text: "allowlist 非空时只要求命中任一; blocklist 任一命中就 drop"）
          4. ④ location — allowed_countries / allowed_cities /
             disallowed_countries 三 TagInput (全空=不过滤)
          5. ⑤ seniority — TagInput (options hint: IC1 IC2 IC3 IC4 IC5 IC6
             Senior Staff Principal Manager Director VP)
          6. ⑥ posted_within_days — number input (0 = 不限)
          7. ⑦ comp_floor — base_min / total_min + currency select
          8. ⑧ jd_text_blocklist — TagInput + help
             "需先 JD Enrich 完成才评估（最贵，最后跑）"
        - Section 末尾 **Preview bar**:
          - 按钮 "Run Preview on recent 100 jobs" (secondary style,
            `.af-btn-secondary`)
          - 点击 → POST /api/career/preferences/preview → 等结果（loading
            spinner）
          - 结果展示: "Of 100 recent jobs: 37 would be dropped (23 new),
            63 would pass"
          - 再下 collapsible "Show breakdown by rule":
            - 列 9 条: "source_filter: 3 drops", "company_blocklist: 8 drops",
              ... (点开 hover 每个 drop 理论上带 matched_value，但 stub 只 mock)
          - help text "⚠️ Preview uses mock data until 05-finder/03-dedupe
            ships. True drops will come from real pipeline scan."

      **server.mjs** stub API (~60 行):
        - POST /api/career/preferences/preview:
          - body = 完整 preferences (client 发当前表单状态 — 支持 unsaved
            preview)
          - 返回 mock breakdown:
            ```json
            {
              "total_jobs": 100,
              "would_drop": 37,
              "would_pass": 63,
              "new_drops": 23,  // 相对当前持久化的 preferences
              "breakdown": [
                {"rule": "source_filter", "drops": 3, "example_values": [...]},
                {"rule": "company_blocklist", "drops": 8, ...},
                ...  // 9 条
              ],
              "stub": true,
              "note": "Mock data. Real pipeline dry-run ships with 05-finder/03-dedupe-hard-filter."
            }
            ```
          - stub 逻辑: 根据 preferences.hard_filters 里非空字段数估算
            drops（e.g., 每条非空 blocklist 给 +2~5 drops），让 UI 动起来
          - **MUST 在 response 里标 stub: true** — 前端 UI 上显示 ⚠️ 提示

      **追加到 ats-form.css** (~20 行):
        - .af-filter-ordinal (① ②... 圆形 badge 蓝底白字)
        - .af-preview-bar (sticky 某处 + 按钮 + 结果)
        - .af-preview-result (grid / 数字 highlight)
        - .af-btn-secondary (次要按钮样式)

      验收:
      - /career/settings/preferences 拉到最下 → 看到 Section 7 + 9 子项
