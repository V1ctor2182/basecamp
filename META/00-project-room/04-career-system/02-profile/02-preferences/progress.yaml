milestones:
  - id: "m1-preferences-backend"
    name: "Backend GET/PUT /api/career/preferences + Zod schema (permissive) + YAML IO"
    status: completed
    actual_lines: 220
    actual_files:
      - "server.mjs"
    estimated_files:
      - "server.mjs"
    estimated_lines: 140
    depends_on: []
    complexity_flags: []
    open_questions: []
    commit_hash: "0b5b617"
    description: |
      data/career/preferences.yml CRUD API + Zod 校验（partial-save 风格 — 和
      m3-identity 一致）。

      实现:
      - server.mjs 加:
        - PREFERENCES_FILE = path.join(CAREER_DIR, 'preferences.yml')
        - Zod schemas (**permissive**: 所有字段可空 / 数组可空，format 错才 block；
          Applier/Finder/Evaluator 在 use-time re-check completeness)
          - TargetRoleSchema: { title: string, seniority: string,
            function?: string } — 目标岗位一条
          - CompTargetSchema: { base_min?: number, base_max?: number,
            total_min?: number, total_max?: number, currency: string ('USD' 等) }
          - LocationPrefSchema: { accept_any: boolean, remote_only: boolean,
            hybrid_max_days_onsite?: number, preferred_cities: string[],
            acceptable_countries: string[] }
          - HardFiltersSchema (Section 7, 9 条, 按短路顺序命名):
            - source_filter: { blocked_sources: string[] (['linkedin', ...]) }
            - company_blocklist: string[]
            - title_blocklist: string[]
            - title_allowlist: string[]
            - location: { allowed_countries: string[], allowed_cities: string[],
              disallowed_countries: string[] }
            - seniority: { allowed: string[] (['IC3','IC4'...]) }
            - posted_within_days: number (0 = 不限)
            - comp_floor: { base_min?: number, total_min?: number, currency: string }
            - jd_text_blocklist: string[] (必须 JD enrich 后才判)
          - SoftPreferencesSchema: { company_types: string[] (startup/bigco/...),
            remote_culture: string[], tech_stack_preferred: string[],
            tech_stack_avoid: string[], industries_preferred: string[],
            industries_avoid: string[] }
          - ScoringWeightsSchema: { tech_match: number, comp_match: number,
            location_match: number, company_match: number,
            growth_signal: number } (0-1, 前端 sum-validate)
          - ThresholdsSchema: { strong: number, worth: number,
            consider: number, skip_below: number } (1-5 scale)
          - EvaluatorStrategySchema: {
              stage_a: { enabled: boolean, model: string, threshold: number },
              stage_b: { enabled: boolean, model: string,
                blocks: { block_b: boolean, block_c: boolean, block_d: boolean,
                  block_e: boolean, block_f: boolean, block_g: boolean } }
              (Block B / E 在 UI 上强制 true — Tailor 依赖 Block E)
            }
          - PreferencesSchema: { targets: TargetRole[], comp_target: CompTarget,
              location: LocationPref, hard_filters: HardFilters,
              soft_preferences: SoftPreferences, scoring_weights: ScoringWeights,
              thresholds: Thresholds, evaluator_strategy: EvaluatorStrategy }
        - readPreferences() — 读 yaml + zod.parse + 文件不存在返 defaultPreferences()
        - defaultPreferences() — 返回空壳（scoring_weights 5 项 = 0.2 平均分，
          thresholds 默认 {strong:4.5, worth:4.0, consider:3.5, skip_below:3.0}，
          blocks 默认 B/E=true 其他 false）
        - writePreferences(obj) — zod.parse + yaml.dump + 原子写入
        - GET /api/career/preferences — 返回当前或 defaultPreferences()
        - PUT /api/career/preferences — 验证 + 写入，400 on zod error

      验收:
      - curl GET 空文件 → 返回 defaultPreferences()
      - curl PUT partial (只含 targets[0].title) → 200 + yaml 写入
      - curl GET → 读到 partial + defaults 合并（其他字段保持默认）
      - curl PUT malformed (comp_target.base_min="abc") → 400 + zod issues

  - id: "m2-preferences-form-static"
    name: "Settings → Preferences 前 6 Section + TagInput 共享组件"
    status: completed
    actual_lines: 864
    actual_files:
      - "src/career/TagInput.tsx"
      - "src/career/settings/Preferences.tsx"
      - "src/career/settings/ats-form.css"
    estimated_files:
      - "src/career/settings/Preferences.tsx"
      - "src/career/TagInput.tsx"
    estimated_lines: 280
    depends_on: ["m1-preferences-backend"]
    complexity_flags: []
    open_questions: []
    commit_hash: "e17f096"
    description: |
      替换 Preferences.tsx 占位为真实 ATS 风格 6-section 表单（Section 7
      hard_filters 在 m3 做）。复用 Identity 的 ats-form.css (`.af-*` classes)。

      **locked decisions** (from plan-milestones Phase 3):
        - Q1=a: scoring_weights 用 manual sliders (5 slider 0-1) + 实时 sum
          显示 + sum != 1.0 ± 0.01 时红字警告（仍允许 save — 按 partial-save
          精神仅在 apply/evaluate use-time re-check）
        - Q2=c: stage_b_blocks 用 cards with descriptions（每 Block 一张卡
          带说明；Block B 和 Block E 的卡 disabled + "Required by Tailor"
          提示，toggle 永远 true）
        - Q4=a: TagInput 抽成共享 component 放 `src/career/TagInput.tsx` —
          后续 QA Bank / site-adapters / narrative 都复用

      **新文件 `src/career/TagInput.tsx`** (~60 行):
        - props: { value: string[], onChange: (v: string[]) => void,
            placeholder?: string, disabled?: boolean }
        - UI: 已有 tag 显示成 pill + 每个 × 删除；末尾 input，Enter/Tab/逗号
          添加；Backspace 在空 input 删最后一个
        - 样式复用 ats-form.css 里加的 .af-tag-input / .af-tag-pill /
          .af-tag-remove（本 m 末尾追加到 ats-form.css）

      **`src/career/settings/Preferences.tsx`** (~220 行):
        - Pattern 复用 Identity.tsx: useEffect load GET → local state → validate
          {missing, malformed} → canSave = malformed===0 || saving || !dirty
          → PUT + toast + beforeunload
        - Section 1. Target Roles (加减行 widget)
          - targets[]: title* + seniority dropdown* (IC1-IC6/Manager/Director)
            + function (free text optional)
          - ≥1 条时红 * 提示
        - Section 2. Compensation
          - comp_target.base_min / base_max / total_min / total_max (number
            inputs, all optional but format-validated if填) + currency
            dropdown (USD/EUR/GBP/CAD/CNY)
        - Section 3. Location
          - accept_any (toggle) — on 时其他字段 disabled
          - remote_only (toggle) — on 时 hybrid_max_days_onsite disabled
          - hybrid_max_days_onsite (number 0-5)
          - preferred_cities (TagInput)
          - acceptable_countries (TagInput)
        - Section 4. Soft Preferences (6 TagInput 网格 2 列):
          - company_types / remote_culture / tech_stack_preferred /
            tech_stack_avoid / industries_preferred / industries_avoid
        - Section 5. Scoring & Thresholds
          - scoring_weights: 5 slider (tech_match / comp_match /
            location_match / company_match / growth_signal)，每个 0-1
            step 0.05，slider 右边显示当前值
          - 下方 live "Sum: 1.00 ✓" 绿色，或 "Sum: 0.87 (should be 1.00)"
            红色警告
          - thresholds: 4 个 number input (strong/worth/consider/skip_below)
            step 0.1 range 1-5，显示用途说明（"strong 4.5+ 自动进 shortlist,
            skip_below 3.0 以下归档"）
        - Section 6. Evaluator Strategy
          - stage_a: enabled toggle + model text ('claude-haiku-4-5')
            + threshold number (default 3.5)
          - stage_b: enabled toggle + model text ('claude-sonnet-4-6')
            + 6 Block cards (Q2=c locked):
              - 每 card: title (Block B/C/D/E/F/G) + 说明文字
                (e.g., "Block B: Summary — 岗位总结 + 为什么值得考虑")
                + toggle（右上）
              - Block B 的 card: toggle disabled + "Required by Tailor" badge
              - Block E 的 card: toggle disabled + "Required by Tailor" badge
              - 其他 4 Block: toggle 可切换
        - Sticky bottom submit bar (同 Identity): status 左 + Save Preferences
          按钮右

      **追加到 ats-form.css** (~40 行):
        - .af-tag-input container (border + padding + flex wrap)
        - .af-tag-pill (蓝色 pill with text + × button)
        - .af-tag-remove (inline button)
        - .af-slider-row (label + slider + value 三栏 grid)
        - .af-block-card-grid (6 cards 2 列)
        - .af-block-card (带 toggle 的 card)
        - .af-block-card-disabled (灰背景 + 禁用 toggle)
        - .af-block-card-badge (Required badge 红字)

      验收:
      - 打开 /career/settings/preferences → 看到 6 sections 填完 6 段 UI
      - TagInput Enter 添加 + × 删除正常
      - 调 slider → sum 实时更新 + 1.00 时绿色
      - Block B/E toggle 点不动 + 显示 Required badge
      - 填 target[0].title = "SDE"，点 Save → toast "Saved" → 重启 server +
        reload 看到值恢复
      - 清空 title → Save 仍亮（missing 不 block）+ status bar 显示
        "N required missing"
      - comp_target.base_min 填 "abc" → 行内 error + Save 灰

