  - file: "src/career/settings/Preferences.tsx"
    description: "Block Toggles m1: Blocks TS type extended with block_d_websearch / block_f_story_count / block_g_playwright. BLANK() defaults updated. UI sub-controls deferred to m3."
  - file: "src/career/evaluator/stageBPrompt.mjs"
    description: "Block Toggles m1: NEW resolveStageBToolPolicy(prefs) returns {websearch_for_d, playwright_for_g, story_count} with story_count clamped to [3,20] + non-integer/non-finite fallback to STAGE_B_DEFAULT_STORY_COUNT=8. NEW renderSubToggleOverrides(enabledLetters, policy) injects per-block override instructions into buildSystemBlock when sub-toggles diverge from defaults — gated on enabled.has(letter) so disabled parents skip child overrides. Spread-conditional injection preserves byte-equality with pre-m1 prompt on all-defaults path (preserves Anthropic prompt-cache hits)."
