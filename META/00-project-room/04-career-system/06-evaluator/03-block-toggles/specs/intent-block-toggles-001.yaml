  - file: "src/career/evaluator/blockCostEstimates.mjs"
    description: "Block Toggles m2: NEW pure-constants ESM module + estimator. Deep-frozen BLOCK_TOKEN_ESTIMATES per-letter output tokens (F has output_per_story=90, scales with story_count) + TOOL_COST_ADD (web_search $0.05, verify_job_posting $0) + CACHED_SYSTEM_INPUT_TOKENS_EST=14000 + SONNET_OUTPUT_OVERHEAD_TOKENS=100. estimateStageBCost(prefs) returns {model, pricing_available, per_block, cached_input: {tokens, write_cost_first_call, read_cost_subsequent}, total_per_call_current, total_per_call_all_on, delta_savings_usd, delta_savings_pct}. All-on baseline is FIXED reference (always assumes every block + every tool on); F story_count uses live policy.story_count for both current AND baseline. pricing_available flag surfaces missing MODEL_PRICING entry to UI. Pure function — no I/O, render-path safe."
