anchors:
  - file: "src/career/applications/store.mjs"
    description: "Application State m1: NEW pure-Node ESM store. Zod ApplicationSchema (id `^[a-f0-9]{12}-\\d{8}$`; 8-status enum; 4-legitimacy enum default 'Unknown'; non-empty timeline; optional followup; .strict() on all sub-schemas). Frozen VALID_TRANSITIONS state machine + STATUS_RANK for upsert idempotency. atomicWriteJson via .tmp + fs.rename (precedent: scanRunner.atomicWriteJson). 3 typed errors: InvalidTransitionError (carries current_status + allowed_next), ApplicationNotFoundError, TimelineOrderError. Public helpers: readApplications / writeApplications / upsertApplication (idempotent — preserves user-set later states; special partial.creationNote field becomes the 'created' event note) / transitionStatus(id, newStatus, note?) / appendTimelineEvent (rejects backdated ts + reserved internal events 'status_changed' + 'created'). All public helpers JSDoc'd as NOT concurrent-safe at the in-process level — m2 endpoints will add applicationsMutex on top."
  - file: "scripts/smoke-applications-store.mjs"
    description: "Application State m1 smoke: 20 pure-Node asserts. Schema accept/reject / VALID_TRANSITIONS shape (Discarded reachable from all non-terminal; SKIP from non-terminal subset; Offer→Rejected; Discarded terminal) / upsertApplication creates with creation event / upsertApplication idempotent / transitionStatus appends event with from/to/note / illegal jumps throw InvalidTransitionError with allowed_next / appendTimelineEvent rejects backdated ts AND reserved internal events / ApplicationNotFoundError on missing id / schema-violation write leaves no .tmp orphans / STATUS_RANK ordering / readApplications ENOENT → []."
  - file: "server.mjs"
    description: "Application State m2: 4 REST endpoints. GET /api/career/applications (optional ?status=CSV filter, sorted by max(timeline.ts) desc, defensive copy before sort, 400 on empty/unknown filter values), GET /:id (regex-validated, 404 missing), POST /:id/status (Zod StatusUpdateSchema; acquires applicationsMutex BEFORE first await; finally-released; structured 400 with current_status + allowed_next on InvalidTransitionError; 404 missing; 409 mutex contention), POST /:id/timeline (Zod TimelineAppendSchema with USER_TIMELINE_EVENTS excluding reserved internal 'status_changed' + 'created'; default ts = now; backdated ts → 400 TimelineOrderError; same mutex pattern as status endpoint)."
  - file: "src/career/applications/store.mjs"
    description: "Application State m2 additions: applicationsMutex (independent of pipelineMutex — applications.json writes don't block pipeline scans). Synchronous check-then-set pattern mirrors scanRunner.acquirePipelineEnrichLock — acquireApplicationsLock returns {ok, reason?, acquired_at?} for 409-with-context endpoint UX. isApplicationsBusy / acquireApplicationsLock / releaseApplicationsLock exports."
  - file: "scripts/smoke-applications-endpoints.mjs"
    description: "Application State m2 smoke: 11 server-spawn asserts (port 4591). GET /applications shape + counts / Evaluated→Applied transition appends event / illegal jump returns 400 with allowed_next / bad-id regex 400 / unknown-id 404 / ?status=CSV filter sorted by timeline.ts desc / ?status=Bogus → 400 / POST timeline correction event appends / backdated ts → 400 TimelineOrderError / Zod rejects reserved internal events at body-parse layer / concurrent identical POSTs serialize via mutex (one 200 + one 400-or-409)."
