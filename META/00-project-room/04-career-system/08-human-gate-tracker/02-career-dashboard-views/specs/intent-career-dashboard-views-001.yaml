spec_id: "intent-career-dashboard-views-001"
type: intent
state: active
intent:
  summary: "Overview / Shortlist / Applied / Reports 各核心页面 UI"
  detail: |
    career-system 的主要用户入口页面（不含 Settings 子页，那些归各 profile/cv-engine feature）。(1) /career/overview — 总览仪表盘：总申请数 / 按状态分布饼图 / 本周活跃柱状图 / 下次 follow-up 列表 / 成本趋势（ECharts 复用）；(2) /career/shortlist — 已评估 score ≥ 4.0 的岗位（来自 06-evaluator/05-pipeline-ui）；(3) /career/applied — 已 Mark submitted 的岗位 + 时间线可视化（每条 timeline.event 一个节点）+ follow-up 提醒高亮（< 3 天内的标黄）；(4) /career/reports/:id — 单个报告 markdown 渲染（复用 LearnApp 的 markdown viewer），支持左侧 Block A-G 目录导航 + 右侧正文；配套 actions：Tailor CV / Start Apply / Re-evaluate。复用现有组件：LearnApp markdown viewer、TrackerApp 时间线样式、ECharts 图表库。验收：Overview 能从 applications.json 聚合出数字和图；Shortlist 按分数倒序显示 10 条；Applied 点进去能看到完整 timeline；Reports 单页渲染 Block A-G 清晰。
constraints: []
indexing:
  type: intent
  priority: high
  layer: feature
  domain: "04-career-system"
  tags: [frontend, react, echarts, tracker-ui]
provenance:
  source_type: architecture_doc
  confidence: 0.9
  source_ref: "career-architecture/07-gate-tracker.md#ui-career-tab"
relations: []
anchors:
  - file: "src/career/Applied.tsx"
    description: "Career Dashboard m1: full rewrite from 9-line stub (~365 lines). 30s polling of GET /api/career/applications. 7-chip filter strip (All excludes Evaluated; Applied/Responded/Interview/Offer/Rejected/Discarded). Per-row card with ScoreBadge (strong/worth/consider/na tiers mirror sl-score) + role·company + 12-hex id + 8-status color-coded pill (applied=amber, responded=blue, interview=purple, offer=green, rejected=red, discarded/skip=gray). Horizontal timeline stepper renders each timeline[] event as colored dot with hover tooltip (formatRelative + event type + from/to + note?). Followup highlight: ≤3d (FOLLOWUP_WARN_MS=3*86400000) yellow border, past-due red, >3d muted gray. Quick actions: [Report] → /career/reports/{jobId-prefix via row.id.split('-')[0]}, [Job] external link, [Advance status] dropdown with VALID_TRANSITIONS[currentStatus] legal-next-only options + native confirm() with prompt naming source+target + POST /:id/status + on 400 with allowed_next surfaces inline as banner + auto-refresh after success. VALID_TRANSITIONS hardcoded client-side as mirror of server-side store.mjs export (server's .mjs uses Zod/fs which Vite would try to bundle into browser; client-side map is UX-only — server still validates and returns 400 with allowed_next for any drift)."
  - file: "src/career/applied.css"
    description: "Career Dashboard m1: NEW scoped styles with ad- prefix (zero collisions verified vs sl-/rp-/ov-/sbb-/af-/c-/ap-). Filter chip strip (matches sl-chip pattern). Per-row card with left-border color-band per status. Status pills with 8 variants. Timeline stepper: flex-wrap dot pills with ::before colored dot + ::after 4px gray separator line between consecutive dots. Followup highlights with 3 color tiers. Advance Status dropdown styled as blue-outlined select with chevron icon."
  - file: "scripts/smoke-applied-page.mjs"
    description: "Career Dashboard m1 smoke: 5 server-spawn asserts (port 4599 — verified collision-free). GET /applications returns Applied.tsx-consumed shape with timeline preserved / ?status=Applied filter returns only Applied rows with full timeline / Advance Applied → Responded transitions + appends status_changed event with from/to / Quick Discard from Interview allowed (terminal-from-any-non-terminal locked from store.mjs) / Illegal jump Applied → Offer → 400 with allowed_next=['Responded','Discarded','SKIP']."
  - file: "src/career/Overview.tsx"
    description: "Career Dashboard m2: full rewrite from 9-line stub (~400 lines). First Nivo use in the project (@nivo/pie, @nivo/bar, @nivo/line). 3-parallel-fetch aggregator over /api/career/applications + /api/career/shortlist + /api/career/llm-costs + /api/career/llm-costs?groupBy=day&start=14daysAgo with 30s polling + AbortController cleanup + manual refresh button. Partial-failure resilience: /applications has no .catch (network error surfaces full red banner), /shortlist + /llm-costs .catch to null/{} so an outage on a single endpoint degrades gracefully. 4 stat cards in 4-col→2-col responsive grid: Total applications / Stage B this week (timeline[0].ts within last 7 days AND status >= Evaluated) / Active in funnel (Evaluated|Applied|Responded|Interview) / Today's spend (sum cost_usd today; tinted red if >$5 per locked design). Separate appliedTabCount stat (excludes Evaluated) feeds the Applied quick link so the displayed count matches the Applied tab's actual row count (P1 fix from Phase 3.5). Nivo ResponsivePie (status distribution; 8 STATUS_ORDER values Evaluated/Applied/Responded/Interview/Offer/Rejected/Discarded/SKIP filtered to >0 counts; STATUS_COLORS map green-tier Offer/Interview, amber Applied/Responded/Evaluated, red Rejected, gray Discarded/SKIP). Nivo ResponsiveBar (7-day activity stacked by event type created/status_changed/other; oldest-left M/D labels). Nivo ResponsiveLine (14-day cost trend; monotoneX curve; area fill 8% opacity; $-formatted axisLeft; tickValues every 2 days at -45°). Followup list (max 10, sorted asc by nextAt, 3 tones: past-due red / ≤3d yellow (FOLLOWUP_WARN_MS=3*86400000) / >3d gray). Quick links Pipeline / Shortlist (N) / Applied (M) where M=appliedTabCount."
  - file: "src/career/overview.css"
    description: "Career Dashboard m2: NEW scoped styles with ov- prefix (~200 lines, zero collisions verified vs ad-/sl-/rp-/sbb-/af-/c-/ap-). 4-col→2-col responsive stat grid (@media max-width:900px). 2-col→1-col responsive chart row. 240px chart container heights (sizing parent for Nivo Responsive*). 3-tier followup highlights (red/yellow/gray) matching Applied.tsx semantics. ov-stat-warn variant for the today-spend >$5 red tint. Loading skeleton + error banner + stale-data warning + spin animation."
  - file: "scripts/smoke-overview-page.mjs"
    description: "Career Dashboard m2 smoke: 4 server-spawn asserts (port 4585 — verified collision-free). /applications + /shortlist + /llm-costs all return JSON shapes Overview.tsx aggregates over (results array, status, timeline; total + score_floor; total_cost + record_count) / /llm-costs?groupBy=day&start= returns Record<day, {total_cost, record_count, ...}> bucketed shape with today's bucket present / Empty-state path: all 3 endpoints return [] → aggregator shapes stable (results=[], total_cost=0, bucketed={}) / Vite build clean with Nivo imports (placeholder + parent regression covers full build)."
