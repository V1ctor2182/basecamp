    estimated_lines: 280
    depends_on: ["m3-orchestrator-and-integration"]
    complexity_flags: []
    open_questions: []
    description: |
      Final integration: server-side PATCH + dedicated UI (OQ-4=b) to paste JD for
      jobs stuck on tier 4 (needs_manual_enrich=true). UI lives at
      /career/shortlist/needs-manual route.

      Files:
        - server.mjs (+~60 lines):
          · GET /api/career/finder/needs-manual:
              · reads pipeline.json
              · filters jobs where needs_manual_enrich === true
              · returns array of { id, company, role, url, location, posted_at }
          · PATCH /api/career/pipeline/job/:id/description:
