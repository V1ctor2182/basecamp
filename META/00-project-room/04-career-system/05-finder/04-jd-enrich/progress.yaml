milestones:
  - id: "m1-schema-and-ats-refetch"
    name: "Job schema needs_manual_enrich + ATS-by-URL refetch (6 ATS types, workday detect-only)"
    status: completed
    actual_lines: 530
    actual_files:
      - "src/career/lib/jobSchema.mjs"
      - "src/career/finder/atsByUrl.mjs"
      - "scripts/smoke-ats-by-url.mjs"
    commit_hash: "a576183"
    estimated_files:
      - "src/career/lib/jobSchema.mjs"
      - "src/career/finder/atsByUrl.mjs"
      - "scripts/smoke-ats-by-url.mjs"
    estimated_lines: 280
    depends_on: []
    complexity_flags: ["external_api", "design_decisions"]
    open_questions: []
    description: |
      Job schema 加 needs_manual_enrich: boolean (default false) + URL → ATS provider
      detection + content refetch helper. 跨 6 个 ATS:
        greenhouse: boards.greenhouse.io/<slug>/jobs/<id> → /v1/boards/<slug>/jobs/<id>?content=true
        ashby:      jobs.ashbyhq.com/<slug>/<id>          → /api/posting?id=<id>
        lever:      jobs.lever.co/<slug>/<id>             → /v0/postings/<slug>/<id>?content=true
        recruitee:  <slug>.recruitee.com/o/<id>           → /api/offers/<id> (public)
        smartrec.:  jobs.smartrecruiters.com/<slug>/<id>  → posting-api.smartrecruiters.com/v1/postings/<id>
        workday:    *.myworkdayjobs.com/<...>             → DETECT-ONLY (token auth too fragile),
                    return { skip: true } so orchestrator falls through to Playwright

      Files:
        - src/career/lib/jobSchema.mjs (+~20 lines):
          · Add needs_manual_enrich: z.boolean().default(false) to JobSchema
          · normalizeJob() defaults to false if not set
          · backward-compat (existing jobs without field load as false)

        - src/career/finder/atsByUrl.mjs (~180 lines):
          · detectAtsType(url) → { type, slug, id } | null
          · 6 URL regex patterns capturing slug + id
          · refetchAtsContent(detection) → { description: string|null, error?: string }
          · greenhouse/ashby/lever reuse existing httpFetch + stripHtml
          · recruitee/smartrecruiters call public REST endpoints → stripHtml
          · workday returns { skip: true } (no fetch attempt)
          · all 5 fetchers wrap try/catch with 15s timeout, return null on error

        - scripts/smoke-ats-by-url.mjs (~80 lines):
          · 12 URL detection assertions (each ATS valid + invalid + edge cases)
          · 5 content refetch tests with mocked httpFetch (per-provider response shape)
          · workday URL → { skip: true } without network call

      Locked design (long-term-best):
        - URL detection regex-based, no HEAD-request sniffing (cheap, deterministic)
        - workday detect-only: better skip than fragile token logic
        - Bad URL / malformed response → null, never throw (orchestrator decides fallback)
        - description=null preserved (caller decides if needs_manual_enrich)
        - Same `needs_manual_enrich` field name everywhere (schema + helpers + UI)

      验收: smoke 17/17 PASS; tsc + vite build clean

  - id: "m2-playwright-pool-and-scraper"
    name: "Shared Playwright pool (refactor) + pageScraper for JD text extraction"
    status: completed
    actual_lines: 360
    actual_files:
      - "src/career/lib/playwrightPool.mjs"
      - "src/career/lib/htmlToPdf.mjs"
      - "src/career/lib/pageScraper.mjs"
      - "scripts/smoke-page-scraper.mjs"
    commit_hash: "a2e419b"
    review_findings:
      - "[CRITICAL] smoke /__hang fragile across Chromium versions → fixed: write headers, never end body"
      - "[HIGH] idle timer could keep loop alive after SIGTERM → fixed: _idleTimer.unref()"
      - "[MEDIUM] String(undefined) leak in EnrichError msg → fixed: pass empty url"
      - "[MEDIUM] smoke whitespace assertion weak → fixed: /\\s{2,}/ stricter"
    estimated_files:
      - "src/career/lib/playwrightPool.mjs"
      - "src/career/lib/htmlToPdf.mjs"
      - "src/career/lib/pageScraper.mjs"
      - "scripts/smoke-page-scraper.mjs"
    estimated_lines: 220
    depends_on: ["m1-schema-and-ats-refetch"]
    complexity_flags: ["external_api", "error_handling_heavy"]
    open_questions: []
    description: |
      Extract lazy-launch + 30s-idle-close browser lifecycle from htmlToPdf.mjs into
      a shared module so pageScraper + htmlToPdf share ONE chromium process (single
      .launch(), single zombie-recovery, single shutdown). Then build the JD scraper.

      Files:
        - src/career/lib/playwrightPool.mjs (NEW, ~80 lines):
          · getBrowser() — lazy launch, coalesce concurrent first-callers
          · scheduleIdleClose() — 30s idle reset
          · shutdownBrowser() — exported for SIGTERM/SIGINT in server.mjs
          · disconnected listener drops cached handle so next call relaunches

        - src/career/lib/htmlToPdf.mjs (REFACTOR, -~30 / +~5 lines):
          · Replace internal _browser/_idleTimer/_launching/getBrowser/
            scheduleIdleClose/closeBrowser with imports from playwrightPool
          · htmlToPdf() now `await getBrowser()` + `scheduleIdleClose()` only
          · Re-export shutdownBrowser for backward-compat with server.mjs handlers

        - src/career/lib/pageScraper.mjs (NEW, ~80 lines):
          · scrapeJdText(url, { timeout=15000 }) → string | throws EnrichTimeout/EnrichError
          · page.goto(url, { waitUntil: 'domcontentloaded', timeout })
          · 5s additional timeout for content extraction
          · page.evaluate() heuristic main-content selectors (priority order):
              article, main, [role="main"], #content, .job-description,
              .posting-content, body
          · Strip nav, footer, script, style nodes by removing before innerText
          · Trim + collapse whitespace, return text or throw
          · always page.close() in finally; scheduleIdleClose() afterwards

        - scripts/smoke-page-scraper.mjs (~80 lines):
          · Smoke uses page.setContent(<fixture HTML>) — NO real network
          · Tests: article tag preferred / main fallback / strips nav+footer /
            empty body throws / timeout throws EnrichTimeout / unicode preserved /
            500-char threshold semantics

      Locked design:
        - One chromium process for whole career system (htmlToPdf + pageScraper)
        - Shared 30s idle close — busy career features keep browser warm
        - Hard timeout 15s per page (constraint-jd-enrich-001 #3)
        - Selector priority: most-specific structural tags before falling to body
        - Strip nav/footer/script/style at DOM level, not regex
        - Throw distinct error classes so orchestrator can log per-tier

      验收: smoke 7/7 PASS; tsc + vite build clean; htmlToPdf smokes regression-clean

  - id: "m3-orchestrator-and-integration"
    name: "jdEnrich orchestrator (4-tier fallback) + scanRunner integration + POST /enrich endpoint"
    status: pending
    estimated_files:
      - "src/career/finder/jdEnrich.mjs"
      - "src/career/finder/scanRunner.mjs"
      - "server.mjs"
      - "scripts/smoke-jd-enrich.mjs"
    estimated_lines: 280
    depends_on: ["m1-schema-and-ats-refetch", "m2-playwright-pool-and-scraper"]
    complexity_flags: ["error_handling_heavy"]
    open_questions: []
    description: |
      Wire it all together: 4-tier fallback orchestrator, integrate into runScanCore
      AFTER hard_filter but BEFORE atomicWriteJson(pipeline.json) so kept jobs land
      with fresh JDs in pipeline.json (preserves m3-review crash-safety order).
      Plus a manual retry endpoint for already-pipelined jobs (OQ-1=c).

      Files:
        - src/career/finder/jdEnrich.mjs (~150 lines):
          · enrichJob(job) → job (mutated in-place; never throws):
              tier 1: skip if typeof description === 'string' && length > 500
              tier 2: detectAtsType(job.url) → if not workday-skip, refetchAtsContent
              tier 3: scrapeJdText(job.url) — Playwright with 15s timeout
              tier 4: set job.needs_manual_enrich = true, leave description=null
          · enrichBatch(jobs, { concurrency=3 }) → { enriched, needs_manual, skipped }:
              p-limit-style 3-parallel runner (chromium-friendly, OQ-5=a)
              counts per outcome for scan_summary totals
              swallows individual job errors (tier 4 catches all)
          · log.warn per failure with tier attribution

        - src/career/finder/scanRunner.mjs (+~30 lines):
          · import enrichBatch
          · After applyHardFilterBatch, BEFORE atomicWriteJson:
              const { enriched, needs_manual, skipped } =
                await enrichBatch(kept, { concurrency: 3 })
          · pipeline.json totals extends:
              { ..., enriched_count, needs_manual_count, skipped_already_enriched_count }
          · Per-job 20s ceiling (15s nav + 5s buffer); enrichBatch should not block
            scan more than ~10min on 30 jobs (conservative)

        - server.mjs (+~50 lines):
          · POST /api/career/finder/enrich (OQ-1=c manual retry):
              · No body required
              · Reads current pipeline.json kept jobs
              · Filters to those still needing enrich (description=null OR needs_manual_enrich=true)
              · enrichBatch with concurrency=3
              · atomicWriteFile pipeline.json with refreshed jobs
              · Returns { total: N, enriched_now: K, still_needs_manual: M }
              · 409 if a scan is currently running (collision risk on pipeline.json)

        - scripts/smoke-jd-enrich.mjs (~120 lines):
          · MOCK ats-by-url + page-scraper at module level
          · 4-tier fallback: each tier hit + verified flag state
          · enrichBatch concurrency: 6 jobs × Playwright 100ms each → expect ~3 batches × 100ms
          · already-enriched (length > 500) skipped, no fetch attempted
          · workday URL → falls through tier 2, hits tier 3 (Playwright)
          · all-tiers-fail → needs_manual_enrich=true, description=null preserved
          · totals counts match outcomes

      Locked design:
        - Order in scanRunner: filter → enrich kept → write pipeline.json → archive drops → mark seen
          (kept jobs land in pipeline.json with fresh JD; crash-safety preserved)
        - p-limit 3 parallel (OQ-5=a): chromium-friendly, ~12-15 jobs/min
        - Per-job 20s ceiling — bounded scan time
        - Tier 4 NEVER throws — always sets needs_manual_enrich = true + description=null
        - POST /enrich endpoint independent of scan, useful for retry without rescan

      验收:
        - smoke 13/13 PASS
        - integration: synthetic 6-job pipeline (2 already-enriched, 1 greenhouse-url,
          1 generic-url playwright-success, 1 timeout, 1 all-fail) → totals
          {enriched:2, skipped:2, needs_manual:2}; pipeline.json updated; archive.jsonl
          unchanged
        - tsc + vite build clean

