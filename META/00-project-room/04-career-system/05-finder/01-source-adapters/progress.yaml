milestones:
  - id: "m1-scan-infra-greenhouse"
    name: "scan infra (robots-aware fetcher + portalsLoader + scanRunner) + Greenhouse adapter"
    status: completed
    actual_lines: 605
    actual_files:
      - "src/career/finder/httpFetch.mjs"
      - "src/career/finder/portalsLoader.mjs"
      - "src/career/finder/scanRunner.mjs"
      - "src/career/finder/adapters/greenhouse.mjs"
      - "server.mjs"
      - "scripts/smoke-greenhouse-adapter.mjs"
    commit_hash: "c82f5ae"
    estimated_files:
      - "src/career/finder/httpFetch.mjs"
      - "src/career/finder/portalsLoader.mjs"
      - "src/career/finder/scanRunner.mjs"
      - "src/career/finder/adapters/greenhouse.mjs"
      - "server.mjs"
      - "scripts/smoke-greenhouse-adapter.mjs"
    estimated_lines: 330
    depends_on: []
    complexity_flags: ["external_api", "first_of_kind", "design_decisions"]
    open_questions: []
    description: |
      Sprint 5 第一次外部 HTTP. 建立 finder/ 目录的全部 infra (robots fetch +
      portals loader + scan orchestrator + pipeline.json writer), 加第一个
      adapter (Greenhouse). 后续 m2/m3/m4 adapter 仅插拔到本 infra。

      Files:
        - src/career/finder/httpFetch.mjs (~70):
          · UA = "learn-dashboard career-system/1.0 (+https://github.com/V1ctor2182/basecamp)"
          · robotsCache = new Map() — 每次 scan 前 reset
          · checkRobots(url) — fetch <domain>/robots.txt 一次/domain (10s timeout)
            parse simple Disallow lines for our UA, 默认 allow on parse fail
          · httpFetch(url, opts={timeout:10_000, maxBytes:1_048_576})
            - 先 checkRobots(url), blocked → throw RobotsBlockedError
            - AbortController for timeout
            - response.body 读到 maxBytes 截断 (defense vs huge responses)
            - 加 UA header
            - 返 { status, headers, text, json() }

        - src/career/finder/portalsLoader.mjs (~50):
          · SourceConfigSchema (Zod): { type: enum(SOURCE_TYPES), name, config: any, priority?: number }
          · PortalsFileSchema = { sources: SourceConfigSchema[] }
          · readPortalsConfig() → 读 data/career/portals.yml + Zod parse
            (空文件 / 不存在 → 返 { sources: [] })

        - src/career/finder/scanRunner.mjs (~110):
          · ADAPTERS map (m1 仅 'greenhouse', m2/m3 注册新 type)
          · scanState = { running: false, scan_id, started_at, progress: [] }
          · runScan() async:
            - if scanState.running → throw ScanAlreadyRunning
            - reset scanState + robotsCache
            - portals = readPortalsConfig()
            - allJobs = [], scan_summary = []
            - for source of portals.sources:
                t0 = now
                try:
                  adapter = ADAPTERS[source.type]
                  if !adapter → push {source, error: 'unknown type'} continue
                  raws = await adapter.fetch(source.config)  // adapter 内 await sleep(1000)
                  jobs = raws.map(raw => adapter.normalize(raw, source))
                  allJobs.push(...jobs)
                  scan_summary.push({source: source.name, type: source.type,
                    count: jobs.length, duration_ms: now-t0})
                catch err:
                  scan_summary.push({source: source.name, type: source.type,
                    count: 0, duration_ms: now-t0, error: String(err.message)})
            - atomicWriteFile pipeline.json {jobs, last_scan_at, scan_summary}
            - scanState.running = false
          · getScanStatus() → snapshot of scanState
          · await sleep(1000) helper for adapter rate limit

        - src/career/finder/adapters/greenhouse.mjs (~70):
          · async fetch({slug}):
            url = `https://boards-api.greenhouse.io/v1/boards/${slug}/jobs?content=true`
            await sleep(1000)
            return (await httpFetch(url).json()).jobs ?? []
          · normalize(raw, source):
            const sourceUrl = `https://boards.greenhouse.io/${source.config.slug}`
            return normalizeJob({
              id: hashJobId(source.name, raw.title, 'greenhouse', String(raw.id)),
              source: { type:'greenhouse', name:source.name, url:sourceUrl },
              company: source.name,
              role: raw.title,
              location: parseLocation(raw.location?.name ?? ''),
              url: raw.absolute_url,
              description: stripHtml(raw.content ?? null),
              posted_at: raw.updated_at ?? null,
              comp_hint: null,
              tags: raw.metadata?.flatMap(m => m.value_type==='string' ? [m.value]:[]) ?? [],
              raw,
            })

        - server.mjs (+~30):
          · POST /api/career/finder/scan → kick runScan() (no await), 返 202
            { scan_id, started_at } 或 409 ScanAlreadyRunning
          · GET /api/career/finder/scan/status → getScanStatus()

        - scripts/smoke-greenhouse-adapter.mjs (~60):
          · fixture: 内置 sample 3 jobs JSON
          · assertions:
            - normalizeGreenhouse(fixture[0], {name:'Anthropic', config:{slug:'anthropic'}})
              → JobSchema parse OK, id 12 hex, source.type='greenhouse'
            - description = stripHtml(content) 不含 <p>
            - parseLocation 成数组
          · live test (--live flag): fetch real Anthropic GH (1 call), assert >=10 jobs
          · robots: mock fetch /robots.txt with 'User-agent: * Disallow: /v1/' → expect block

      Locked design (long-term-best):
        - pipeline.json shape: { jobs, last_scan_at, scan_summary: [{source, type, count, duration_ms, error?}] }
        - Scan async: POST 202 + scan_id, GET /status for progress poll
        - Rate limit: 1s between adapter fetch (sequential)
        - Robots: shared httpFetch checks once per domain per scan (cached); blocked → throw + scan_summary error entry
        - UA: 公开 + 项目 URL (符合 constraint #3)
        - Concurrent scan: 409 if running
        - 错误隔离: 单 source 挂不影响其他 (try/catch per source)
        - Description: stripHtml(content) → plain text (Evaluator 用)
        - comp_hint: GH 不抽 (信号弱)

      验收:
        - node scripts/smoke-greenhouse-adapter.mjs → fixture+robots block PASS
        - node scripts/smoke-greenhouse-adapter.mjs --live → 实抓 Anthropic ≥10 jobs ✓
        - curl POST /api/career/finder/scan → 202 + scan_id
        - curl GET /api/career/finder/scan/status → progress 流式更新
        - 完成后 cat data/career/pipeline.json → jobs[] + scan_summary 完整
        - 二次 POST during scan → 409 ✓
        - portals.yml 加不存在的 slug → 该 source 报错但其他成功 ✓
        - tsc --noEmit + vite build clean

