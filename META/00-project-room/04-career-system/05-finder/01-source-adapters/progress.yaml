    estimated_lines: 160
    depends_on: ["m1-scan-infra-greenhouse"]
    complexity_flags: ["external_api"]
    open_questions: []
    description: |
      复用 m1 infra. 仅插拔两个新 adapter 到 ADAPTERS map。

      - adapters/ashby.mjs (~70):
        url = `https://api.ashbyhq.com/posting-api/job-board/${slug}`
        return (await httpFetch(url).json()).jobs ?? []
        normalize: raw.title / raw.location / raw.descriptionHtml /
        raw.publishedAt / raw.applyUrl
      - adapters/lever.mjs (~70):
        url = `https://api.lever.co/v0/postings/${slug}?mode=json`
        await httpFetch(url).json() (top-level array)
        normalize: raw.text / raw.categories.location / raw.descriptionPlain /
        raw.createdAt / raw.applyUrl
      - scanRunner: register ADAPTERS.ashby + ADAPTERS.lever
      - smoke 重写 to parametric: 三个 ATS 各 fixture + 各 1 live (--live 跑 OpenAI Ashby + xx Lever)

      验收: 整 portals.yml (4 GH + 2 Ashby + 2 Lever) 跑一次 → pipeline.json
      jobs ≥ 100 + scan_summary 8 行全 count > 0 (live)

  - id: "m3-github-md"
    name: "github-md adapter (SimplifyJobs README markdown table parser)"
    status: pending
    estimated_files:
      - "src/career/finder/adapters/githubMd.mjs"
      - "src/career/finder/scanRunner.mjs"
      - "scripts/smoke-github-md.mjs"
    estimated_lines: 150
    depends_on: ["m2-ashby-lever"]
    complexity_flags: ["external_api"]
    open_questions: []
    description: |
      高 ROI 源: SimplifyJobs / speedyapply / ouckah-Summer2025 等公开 GitHub repo
      的 New-Grad / Internship 表格. 直接 fetch raw.githubusercontent.com markdown.

      - adapters/githubMd.mjs (~100):
        config = { repo: 'SimplifyJobs/Summer2025-Internships', path: 'README.md', branch?: 'dev' }
        url = `https://raw.githubusercontent.com/${repo}/${branch}/${path}`
        await httpFetch(url).text()
        parseMarkdownTable(md) → rows[]:
          · 找 first | Company | Role | Location | ...
          · skip separator | --- |
          · 每行 split by '|', trim, drop empty edges
          · 处理 ↳ (U+21B3) 续行 = inherit company from prev row
          · 处理 🔒 (U+1F512) lock = 已关闭, skip
          · link 提取: '[Apply](https://...)' or '<a href=...>' regex
        normalize: company / role / location / url (apply link) /
        description=null (待 04-enrich) / posted_at parse '0d' '1d' relative → ISO
        comp_hint=null tags=[]

      smoke: fixture 3 markdown samples (含 ↳ + 🔒 + 标准行) + 1 live (SimplifyJobs)

      验收: portals.yml 加 1 个 github-md repo → scan 后 pipeline.json
      新增 ≥ 50 jobs from github-md, ↳ 行 company 正确继承, 🔒 行被 skip

  - id: "m4-manual-and-portals-ui"
    name: "manual paste endpoint + Settings → Portals UI (ROOM COMPLETE)"
    status: pending
    estimated_files:
      - "src/career/finder/adapters/manual.mjs"
      - "server.mjs"
      - "src/career/settings/Portals.tsx"
      - "src/career/settings/portals.css"
      - "src/CareerApp.tsx"
      - "scripts/smoke-manual-adapter.mjs"
    estimated_lines: 280
    depends_on: ["m3-github-md"]
    complexity_flags: ["external_api"]
    open_questions: []
    description: |
      闭环 source-adapters. manual paste = user 粘 URL → server fetch
      HTML + cheerio 抽 <title> 作 role fallback. UI = Settings → Portals
      CRUD (与 Identity / QA Bank 同 pattern).

      - adapters/manual.mjs (~50):
        manualPaste({ url, title?, note? }):
          · validate url
          · if (!title) try cheerio.load((await httpFetch(url, {maxBytes: 1_048_576})).text())
            extract $('title').text() trim, fallback url.hostname
          · normalize as Job:
            id: hashJobId('manual', title||url, 'manual', url)
            source: {type:'manual', name:'Manual paste', url}
            company: hostname (placeholder, 待 04-enrich 改)
            role: title (extracted or user-given)
            location: []
            url: input url
            description: null
            comp_hint: null
            tags: ['enriched_via:manual_pending']
            raw: { url, title, note }

      - server.mjs (+~50):
        · POST /api/career/pipeline/manual { url, title?, note? }
          → manualPaste() → append job to pipeline.json (atomic merge)
        · GET /api/career/finder/portals → readPortalsConfig()
        · PUT /api/career/finder/portals { sources: [...] } → Zod parse + atomicWriteFile portals.yml
          (与 identity.yml writer pattern 一致)

      - src/career/settings/Portals.tsx (~150):
        与 Identity.tsx 同 pattern (state / load / dirty / save):
        · 顶部表格列出 sources: type / name / config (json) / priority
        · Add row button + 每行 Edit + Delete
        · type 是 dropdown (SOURCE_TYPES from jobSchema.mjs)
        · config 字段按 type 切换 schema (greenhouse: slug; ashby: slug;
          lever: slug; github-md: {repo, path, branch?})
          (manual 不在 portals 里, 是 paste endpoint)
        · Save 触发 PUT, beforeunload guard
      - src/career/settings/portals.css (~80)
      - CareerApp.tsx: 加 <Route path="portals" element={<Portals/>} /> 到 SettingsLayout

      - smoke-manual-adapter.mjs (~50):
        · fixture HTML with <title>Software Engineer at Acme</title> → manualPaste 正确抽取
        · no title HTML → fallback hostname
        · 大 body (>1MB) → 截断不挂

      ROOM COMPLETE work:
        - room.yaml lifecycle: planning → active
        - _tree.yaml 同步
        - spec.md ROOM COMPLETE rewrite
        - 05-finder sub-epic propagation: 20% → 40% (2/5 features ✅)
        - 04-career-system 顶层 propagation: 48% → ~50%

      验收:
