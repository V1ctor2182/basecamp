<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Senior Backend Engineer at Stripe — Lever</title>
</head>
<body>
  <header>
    <nav aria-label="Primary">
      <a href="https://stripe.com">Stripe</a>
      <a href="/stripe">All openings</a>
    </nav>
  </header>

  <main>
    <h1>Senior Backend Engineer, Payments</h1>
    <p class="posting-categories">Remote · Engineering · Full-time</p>

    <section aria-labelledby="apply-heading">
      <h2 id="apply-heading">Apply for this job</h2>

      <form data-qa="posting-application-form" action="/stripe/123/apply" method="post" enctype="multipart/form-data">
        <div class="application-question">
          <label for="resume_upload">Resume/CV <span class="required">✱</span></label>
          <input id="resume_upload" name="resume" type="file" accept=".pdf,.doc,.docx" aria-required="true" required />
        </div>

        <div class="application-question">
          <label for="full_name">Full name <span class="required">✱</span></label>
          <input id="full_name" name="name" type="text" aria-required="true" required />
        </div>

        <div class="application-question">
          <label for="applicant_email">Email <span class="required">✱</span></label>
          <input id="applicant_email" name="email" type="email" aria-required="true" required />
        </div>

        <div class="application-question">
          <label for="phone_number">Phone</label>
          <input id="phone_number" name="phone" type="tel" />
        </div>

        <div class="application-question">
          <label for="current_company">Current company</label>
          <input id="current_company" name="org" type="text" />
        </div>

        <div class="application-question">
          <label for="linkedin">LinkedIn URL</label>
          <input id="linkedin" name="urls[LinkedIn]" type="url" />
        </div>

        <div class="application-question">
          <fieldset>
            <legend>How did you hear about this job? <span class="required">✱</span></legend>
            <label><input type="radio" name="source" value="referral" aria-required="true" /> Referral</label>
            <label><input type="radio" name="source" value="linkedin" /> LinkedIn</label>
            <label><input type="radio" name="source" value="other" /> Other</label>
          </fieldset>
        </div>

        <div class="application-question">
          <label>
            <input type="checkbox" name="gdpr_consent" aria-required="true" required />
            I consent to Stripe processing my data
            <span class="required">✱</span>
          </label>
        </div>

        <button type="submit" class="postings-btn template-btn-submit">Submit application</button>
      </form>
    </section>
  </main>

  <footer>
    <nav aria-label="Footer">
      <a href="https://www.lever.co">Powered by Lever</a>
      <a href="https://stripe.com/privacy">Privacy</a>
    </nav>
  </footer>
</body>
</html>
